<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 UI 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "맑은 고딕", sans-serif;
      background-color: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    /* 부모를 ul로 변경 */
    .wrap {
      display: flex;
      gap: 20px;
      margin: 0 auto;
      list-style: none; /* 기본 불릿 제거 */
    }

    /* 각 카드를 li로 사용 */
    .card {
      width: 360px;
      background-color: #ffffff;
      border-radius: 16px;
      overflow: hidden;
    }

    .card-image {
      height: 260px;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 42px 20px;
    }

    .card-content * {
      margin: 0;
      padding: 0;
    }

    .card-badge {
      font-size: 14px;
      color: #8274B9;
      margin-bottom: 8px;
      display: block;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .card-price {
      font-size: 26px;
      font-weight: 800;
      color: #111;
    }

    .card-price span {
      font-size: 16px;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <!-- div → ul 변경 -->
  <ul class="wrap">

    <!-- 카드 1 -->
    <li class="card">
      <div class="card-image">
        <img src="./images/1.jpg" alt="여행 이미지">
      </div>

      <div class="card-content">
        <p class="card-badge">패키지</p>

        <h2 class="card-title">
          [출발확정] 골드코스트/시드니 6일#카럼빈생추어리 #열대과일농장 ...
        </h2>

        <p class="card-price">
          1,499,000<span>원~</span>
        </p>
      </div>
    </li>

    <!-- 카드 2 -->
    <li class="card">
      <div class="card-image">
        <img src="https://picsum.photos/400/300?2" alt="여행 이미지">
      </div>

      <div class="card-content">
        <p class="card-badge">패키지</p>

        <h2 class="card-title">
          [특가] 방콕/파타야 5일 #마사지 #야시장 #자유일정 포함
        </h2>

        <p class="card-price">
          899,000<span>원~</span>
        </p>
      </div>
    </li>

    <!-- 카드 3 -->
    <li class="card">
      <div class="card-image">
        <img src="https://picsum.photos/400/300?3" alt="여행 이미지">
      </div>

      <div class="card-content">
        <p class="card-badge">패키지</p>

        <h2 class="card-title">
          [인기] 제주도 3일 #렌터카 #호텔 #자유여행
        </h2>

        <p class="card-price">
          299,000<span>원~</span>
        </p>
      </div>
    </li>

  </ul>

</body>
</html>
