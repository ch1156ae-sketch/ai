<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차박 어디로</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;background:#e5e7eb;font-family:sans-serif;
}

.app{
  width:100%;max-width:420px;height:100dvh;
  background:#fff;display:flex;flex-direction:column;overflow:hidden;
}

/* 텍스트 */
.text{padding:60px 24px 0}
h1{font-size:34px;line-height:1.3;color:#2d3a60}
h1 span{font-size:26px;color:#6b7da5}
p{margin-top:14px;font-size:15px;color:#909ebd}

/* 비주얼 */
.visual{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:end;
  position:relative;
  padding-bottom:60px;
}

.visual::before{
  content:"";
  position:absolute;
  right:-40px;
  bottom:40px;
  width:120%;
  height:75%;
  background:#f2f5fa;
  border-radius:60% 0 0 0;
}

.visual img{
  width:85%;
  max-width:320px;
  position:relative;
}

/* 하단 */
.bottom{padding:0 24px 30px;text-align:center}

/* dot */
.dots{
  display:flex;justify-content:center;gap:10px;margin-bottom:25px;
}
.dots span{
  width:10px;height:10px;border-radius:50%;
  background:#e6ebf4;
}
.dots span.active{
  background:#526db0;width:22px;border-radius:6px;
}

/* 버튼 */
button{
  width:100%;height:56px;border:none;
  border-radius:14px;background:#526db0;
  color:#fff;font-size:17px;font-weight:700;
}
button:active{transform:scale(.97)}
</style>
</head>

<body>
<div class="app">

  <div class="text">
    <h1>
      차박<br>
      어디로 <span>떠나야 할지 모르겠나요</span>
    </h1>
    <p>지도기반 위치 앱 및 키워드 검색으로 내가 원하는 장소를 한번에</p>
  </div>

  <div class="visual">
    <img src="./images/w1image.png" alt="일러스트">
  </div>

  <div class="bottom">
    <div class="dots">
      <span class="active"></span>
      <span></span>
      <span></span>
    </div>

    <!-- ✔ 버튼 클릭 시 alert만 실행 -->
    <button onclick="alert('차박 탐색을 시작합니다!')">시작하기</button>
  </div>

</div>
</body>
</html>
