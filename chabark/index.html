<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cambak</title>
<style>
body{margin:0;background:#ececec;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif}
.wrap{text-align:center;animation:fade 1s ease}
.dots{margin-top:16px}
.dot{width:6px;height:6px;background:#2f5fa8;border-radius:50%;display:inline-block;margin:0 2px;opacity:.3;animation:b 1s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="wrap">
<img src="./images/spimage.png" style="width:140px;display:block;margin:0 auto;">
<div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>
<script>
setTimeout(()=>{location.href='work1.html'},3000)
</script>
</body>
</html>
