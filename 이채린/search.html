<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>검색 - UTBT 식품 커머스</title>

        <link
            rel="stylesheet"
            href="./css/common.css"
        />
        <link
            rel="stylesheet"
            href="./css/components/bottom-nav.css"
        />
        <link
            rel="stylesheet"
            href="./css/pages/search.css"
        />
    </head>

    <body>
        <section
            class="mobile-app"
            aria-label="검색 - UTBT 모바일 화면"
        >
            <main class="search-page">
                <!-- 검색 페이지 전용 상단바: 공통 헤더 아님 -->
                <header class="search-header">
                    <button
                        type="button"
                        class="search-back-btn"
                        aria-label="뒤로가기"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="m15 18-6-6 6-6" />
                        </svg>
                    </button>

                    <form
                        class="search-form"
                        role="search"
                    >
                        <input
                            type="search"
                            class="search-input"
                            placeholder="검색어를 입력해주세요"
                            aria-label="검색어 입력"
                        />

                        <button
                            type="submit"
                            class="search-submit-btn"
                            aria-label="검색하기"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <circle
                                    cx="11"
                                    cy="11"
                                    r="7"
                                />
                                <path d="m20 20-3.5-3.5" />
                            </svg>
                        </button>
                    </form>
                </header>

                <section class="search-content">
                    <!-- 검색 결과 영역: 검색 전에는 숨김 -->
                    <section
                        class="search-result-area"
                        aria-label="검색 결과"
                    >
                        <h2 class="search-result-title"></h2>
                        <p
                            class="search-empty-text"
                            aria-live="polite"
                        ></p>

                        <ul class="search-result-grid"></ul>

                        <h3 class="recommend-fallback-title">추천 상품</h3>
                        <ul class="recommend-fallback-grid"></ul>
                    </section>

                    <!-- 검색 전 키워드 영역 -->
                    <section
                        class="search-section"
                        aria-label="최근 키워드"
                    >
                        <div class="search-section-title-row">
                            <h2 class="search-section-title">최근 키워드</h2>
                            <button
                                type="button"
                                class="clear-recent-btn"
                            >
                                전체삭제
                            </button>
                        </div>

                        <div
                            class="keyword-chip-list recent-keyword-list"
                        ></div>
                    </section>

                    <section
                        class="search-section"
                        aria-label="추천 키워드"
                    >
                        <h2 class="search-section-title">추천 키워드</h2>

                        <div
                            class="keyword-chip-list search-recommend-keywords"
                        >
                            <button
                                type="button"
                                class="keyword-chip recommend"
                            >
                                주스용사과
                            </button>
                            <button
                                type="button"
                                class="keyword-chip recommend"
                            >
                                한입고구마
                            </button>
                            <button
                                type="button"
                                class="keyword-chip recommend"
                            >
                                당근라페용
                            </button>
                            <button
                                type="button"
                                class="keyword-chip recommend"
                            >
                                못난이토마토
                            </button>
                            <button
                                type="button"
                                class="keyword-chip recommend"
                            >
                                오이특가
                            </button>
                        </div>
                    </section>

                    <section
                        class="search-section"
                        aria-label="인기 키워드"
                    >
                        <h2 class="search-section-title">인기 키워드</h2>

                        <div class="popular-keyword-list">
                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">1</span>
                                <span class="popular-keyword-text"
                                    >파지 치즈</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">2</span>
                                <span class="popular-keyword-text"
                                    >못난이 당근</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">3</span>
                                <span class="popular-keyword-text"
                                    >한입 고구마</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">4</span>
                                <span class="popular-keyword-text"
                                    >꼬마 파프리카</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">5</span>
                                <span class="popular-keyword-text"
                                    >꼬불이 오이</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">6</span>
                                <span class="popular-keyword-text"
                                    >못난이 토마토</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">7</span>
                                <span class="popular-keyword-text"
                                    >파지 양파</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">8</span>
                                <span class="popular-keyword-text"
                                    >못난이 명란</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">9</span>
                                <span class="popular-keyword-text"
                                    >조각 연어</span
                                >
                            </button>

                            <button
                                type="button"
                                class="popular-keyword-btn"
                            >
                                <span class="popular-keyword-rank">10</span>
                                <span class="popular-keyword-text"
                                    >못난이 딸기</span
                                >
                            </button>
                        </div>
                    </section>
                </section>
            </main>

            <!-- 검색 페이지는 하단 홈바 유지 -->
            <div id="appBottomNav"></div>
        </section>

        <script>
            window.UTBT_PAGE = "search";
        </script>

        <script src="./js/data.js"></script>
        <script src="./js/common.js"></script>
        <script src="./js/components/bottom-nav.js"></script>
        <script src="./js/pages/search.js"></script>

        <script>
            renderBottomNav("search");
        </script>
    </body>
</html>
