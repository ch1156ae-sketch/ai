<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>알림 - UTBT</title>
        <link
            rel="stylesheet"
            href="./css/common.css"
        />
        <link
            rel="stylesheet"
            href="./css/components/header.css"
        />
        <link
            rel="stylesheet"
            href="./css/components/bottom-nav.css"
        />
        <link
            rel="stylesheet"
            href="./css/pages/alarm.css"
        />
    </head>
    <body>
        <section
            class="mobile-app"
            aria-label="알림 - UTBT 모바일 화면"
        >
            <div
                id="appHeader"
                class="header-slot"
            ></div>
            <main
                class="alarm-page app-page"
                aria-label="알림 페이지"
            >
                <section class="alarm-content">
                    <article class="alarm-summary-card">
                        <div class="alarm-summary-img">
                            <img
                                src="https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=144&h=144&q=80"
                                alt="관심 품목 알림"
                            />
                        </div>
                        <div class="alarm-summary-text">
                            <strong>관심 품목 알림</strong>
                            <p>
                                내가 찜한 식재료,<br />구조 요청 시 알려드려요!
                            </p>
                        </div>
                        <button
                            type="button"
                            class="alarm-more-btn"
                            aria-label="관심 품목 알림 더보기"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path d="M12 6h.01" />
                                <path d="M12 12h.01" />
                                <path d="M12 18h.01" />
                            </svg>
                        </button>
                    </article>
                    <section
                        class="alarm-list-card"
                        aria-label="관심 품목 알림 설정"
                    >
                        <div class="alarm-row is-on">
                            <div class="alarm-item-name">
                                <span class="alarm-item-icon">🍓</span
                                ><span>딸기</span>
                            </div>
                            <div class="alarm-row-right">
                                <span class="alarm-state-text">알림끄기</span
                                ><button
                                    type="button"
                                    class="alarm-switch is-on"
                                    aria-label="딸기 알림 켜짐"
                                    aria-pressed="true"
                                ></button>
                            </div>
                        </div>
                        <div class="alarm-row">
                            <div class="alarm-item-name">
                                <span class="alarm-item-icon">🍅</span
                                ><span>토마토</span>
                            </div>
                            <div class="alarm-row-right">
                                <span class="alarm-state-text">알림설정</span
                                ><button
                                    type="button"
                                    class="alarm-switch"
                                    aria-label="토마토 알림 꺼짐"
                                    aria-pressed="false"
                                ></button>
                            </div>
                        </div>
                        <div class="alarm-row">
                            <div class="alarm-item-name">
                                <span class="alarm-item-icon">🧀</span
                                ><span>치즈</span>
                            </div>
                            <div class="alarm-row-right">
                                <span class="alarm-state-text">알림설정</span
                                ><button
                                    type="button"
                                    class="alarm-switch"
                                    aria-label="치즈 알림 꺼짐"
                                    aria-pressed="false"
                                ></button>
                            </div>
                        </div>
                        <div class="alarm-row">
                            <div class="alarm-item-name">
                                <span class="alarm-item-icon">🧅</span
                                ><span>양파</span>
                            </div>
                            <div class="alarm-row-right">
                                <span class="alarm-state-text">알림설정</span
                                ><button
                                    type="button"
                                    class="alarm-switch"
                                    aria-label="양파 알림 꺼짐"
                                    aria-pressed="false"
                                ></button>
                            </div>
                        </div>
                    </section>
                </section>
            </main>
            <div
                id="appBottomNav"
                class="bottom-nav-slot"
            ></div>
        </section>
        <script>
            window.UTBT_PAGE = "home";
            window.UTBT_HEADER = { title: "알림", backHref: "index.html" };
        </script>
        <script src="./js/components/header.js"></script>
        <script src="./js/components/bottom-nav.js"></script>
        <script src="./js/data.js"></script>
        <script src="./js/common.js"></script>
        <script src="./js/pages/alarm.js"></script>
    </body>
</html>
