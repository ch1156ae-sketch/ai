<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부산맛집 정보 서비스</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    :root {
      --app-width: 1200px;
      --border: #d9d9d9;
      --text-sub: #444;
      --text-muted: #666;
      --black: #000;
      --white: #fff;
    }

    .app {
      max-width: var(--app-width);
      margin: 0 auto;
      min-height: 100vh;
      background: #f6f6f6;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246, 246, 246, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .search-box {
      display: flex;
      align-items: center;
      width: 320px;
      max-width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .search-box input {
      width: 100%;
      height: 42px;
      border: 0;
      outline: 0;
      padding: 0 16px;
      font-size: 14px;
      background: transparent;
    }

    .search-box button,
    .ghost-btn,
    .primary-btn,
    .icon-btn {
      cursor: pointer;
      border: 0;
      background: #fff;
      font: inherit;
    }

    .search-box button {
      width: 48px;
      height: 42px;
      border-left: 1px solid var(--border);
      font-size: 18px;
      background: #fff;
    }

    .ghost-btn,
    .primary-btn {
      height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    .primary-btn {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .content {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 0;
      min-height: calc(100vh - 76px);
    }

    .list-panel {
      background: #fff;
      border-right: 1px solid var(--border);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .list-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fafafa;
    }

    .list-head strong {
      font-size: 15px;
    }

    .list-head span {
      font-size: 13px;
      color: var(--text-muted);
    }

    .restaurant-list {
      overflow: auto;
      height: calc(100vh - 76px - 65px);
    }

    .restaurant-item {
      position: relative;
      padding: 20px 56px 20px 20px;
      border-bottom: 1px solid #ececec;
      background: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .restaurant-item:hover,
    .restaurant-item.active {
      background: #f8f8f8;
    }

    .restaurant-item h3 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .restaurant-item p {
      margin: 4px 0;
      font-size: 14px;
      color: #222;
      line-height: 1.45;
      word-break: keep-all;
    }

    .restaurant-item .line-label {
      display: inline-block;
      min-width: 38px;
      color: #111;
      font-weight: 700;
    }

    .item-actions {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      font-size: 20px;
      color: #111;
    }

    .detail-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #f6f6f6;
    }

    .detail-scroll {
      overflow: auto;
      height: calc(100vh - 76px);
      padding: 24px;
    }

    .detail-card {
      background: #f6f6f6;
    }

    .detail-top {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 32px;
      align-items: start;
    }

    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 0.82;
      background: #ddd;
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .floating-fav {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      font-size: 24px;
      cursor: pointer;
    }

    .info-box {
      padding-top: 2px;
    }

    .info-row {
      margin-bottom: 14px;
      line-height: 1.45;
    }

    .info-label {
      display: inline-block;
      padding: 2px 6px;
      margin-bottom: 6px;
      background: #000;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .info-value {
      font-size: 17px;
      color: #222;
      word-break: keep-all;
    }

    .info-value.multiline {
      line-height: 1.5;
    }

    .homepage-box {
      width: 100%;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      background: #000;
      color: #fff;
      font-size: 14px;
      text-decoration: none;
    }

    .map-card {
      margin-top: 14px;
      background: #ddd;
      border: 1px solid #e2e2e2;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 340px;
      background: #e8e8e8;
    }

    .empty,
    .loading,
    .error-box {
      padding: 32px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    .meta-bar {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px dashed #cfcfcf;
      background: #fff;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .mobile-detail-toggle {
      display: none;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 400px 1fr;
      }

      .detail-top {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    @media (max-width: 820px) {
      .header-inner {
        padding: 14px 16px;
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar {
        justify-content: stretch;
      }

      .search-box {
        width: 100%;
      }

      .content {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .list-panel {
        border-right: 0;
      }

      .restaurant-list {
        height: auto;
        max-height: none;
      }

      .detail-panel {
        display: none;
      }

      .detail-panel.show-mobile {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 50;
        background: #f6f6f6;
      }

      .detail-panel.show-mobile .detail-scroll {
        height: 100vh;
        padding-top: 72px;
      }

      .mobile-detail-toggle {
        display: inline-flex;
        position: fixed;
        top: 14px;
        right: 16px;
        z-index: 60;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        border: 0;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
      }

      .detail-scroll {
        height: auto;
        padding: 16px;
      }

      .detail-top {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .photo-wrap {
        aspect-ratio: 1 / 0.82;
      }

      #map {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <h1>부산맛집 정보 서비스</h1>
          <p>공공데이터 + 카카오맵 기반 맛집 탐색</p>
        </div>

        <div class="toolbar">
          <div class="search-box">
            <input id="keywordInput" type="text" placeholder="상호명, 메뉴, 구·군으로 검색" />
            <button id="searchBtn" type="button" aria-label="검색">⌕</button>
          </div>
          <button id="reloadBtn" class="ghost-btn" type="button">새로고침</button>
          <button id="loadBtn" class="primary-btn" type="button">데이터 불러오기</button>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="list-panel">
        <div class="list-head">
          <strong>맛집 목록</strong>
          <span id="countText">0건</span>
        </div>
        <div id="restaurantList" class="restaurant-list">
          <div class="loading">데이터 불러오기 버튼을 눌러 맛집 목록을 가져오세요.</div>
        </div>
      </section>

      <section id="detailPanel" class="detail-panel">
        <button id="mobileCloseBtn" class="mobile-detail-toggle" type="button" aria-label="닫기">✕</button>
        <div class="detail-scroll">
          <div id="detailCard" class="detail-card">
            <div class="empty">목록에서 맛집을 선택하면 상세 정보와 지도가 표시됩니다.</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    /* ===============================
       사용자 설정 영역
    =============================== */
    const SERVICE_KEY = "9ed3a4e51e1b2c6a6fa6fd8b840ca532ed1526a5ab475c699f2cb44843129d20";
    const KAKAO_JS_KEY = "de00e931f26e156287da4c152c1ad4b0";

    // 공공데이터 API 엔드포인트
    const FOOD_API_BASE = "https://apis.data.go.kr/6260000/FoodService/getFoodKr";

    /* ===============================
       상태
    =============================== */
    let rawItems = [];
    let filteredItems = [];
    let selectedItem = null;
    let map = null;
    let marker = null;
    let kakaoLoaded = false;

    const els = {
      keywordInput: document.getElementById("keywordInput"),
      searchBtn: document.getElementById("searchBtn"),
      loadBtn: document.getElementById("loadBtn"),
      reloadBtn: document.getElementById("reloadBtn"),
      restaurantList: document.getElementById("restaurantList"),
      detailCard: document.getElementById("detailCard"),
      countText: document.getElementById("countText"),
      detailPanel: document.getElementById("detailPanel"),
      mobileCloseBtn: document.getElementById("mobileCloseBtn")
    };

    /* ===============================
       공용 유틸
    =============================== */
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function pick(obj, keys, fallback = "") {
      for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== "") {
          return String(obj[key]).trim();
        }
      }
      return fallback;
    }

    function normalizeWhitespace(text) {
      return String(text || "").replace(/\s+/g, " ").trim();
    }

    function toArray(value) {
      if (Array.isArray(value)) return value;
      if (value == null) return [];
      return [value];
    }

    function parseXmlToJson(xmlText) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const parserError = xml.querySelector("parsererror");
      if (parserError) {
        throw new Error("공공데이터 XML 파싱에 실패했습니다.");
      }

      const rows = Array.from(xml.querySelectorAll("item, row"));
      return rows.map((row) => {
        const obj = {};
        Array.from(row.children).forEach((child) => {
          obj[child.tagName] = child.textContent?.trim() || "";
        });
        return obj;
      });
    }

    function normalizeItem(item, index) {
      const title = pick(item, ["MAIN_TITLE", "TITLE", "RSTR_NM", "REST_NM", "UC_SEQ", "BIZPLC_NM"], `맛집 ${index + 1}`);
      const addr = pick(item, ["ADDR1", "ADDR", "RDNMADR", "SITE_ADDR", "ADDR_OLD", "GUGUN_NM"]);
      const desc = pick(item, ["ITEMCNTNTS", "ITEMCNTNTS", "INTRODUCE", "CNTCT", "CONTENT"]);
      const menu = pick(item, ["RPRSNTV_MENU", "MAIN_MENU", "MENU", "MENU_INFO"]);
      const tel = pick(item, ["CNTCT_TEL", "CNTCTTEL", "TEL_NO", "TEL", "CONTACT"]);
      const useTime = pick(item, ["USAGE_DAY_WEEK_AND_TIME", "USAGE_DAY", "OPEN_TM", "USE_TIME"]);
      const homepage = pick(item, ["HOMEPAGE_URL", "HMPG_URL", "HOMEPAGE", "URL"]);
      const image = pick(item, ["MAIN_IMG_NORMAL", "MAIN_IMG_THUMB", "MAIN_IMG", "IMGURL", "IMAGE_URL"]);
      const lat = parseFloat(pick(item, ["LAT", "WGS84_LAT", "Y", "REFINE_WGS84_LAT"], ""));
      const lng = parseFloat(pick(item, ["LNG", "WGS84_LOGT", "X", "REFINE_WGS84_LOGT"], ""));
      const gugun = pick(item, ["GUGUN_NM", "SIGUN_NM", "DISTRICT"]);

      return {
        id: pick(item, ["UC_SEQ", "ID", "SEQ"], String(index + 1)),
        title,
        addr,
        desc,
        menu,
        tel,
        useTime,
        homepage,
        image,
        lat: Number.isFinite(lat) ? lat : null,
        lng: Number.isFinite(lng) ? lng : null,
        gugun,
        raw: item
      };
    }

    function getApiUrl() {
      const url = new URL(FOOD_API_BASE);
      url.searchParams.set("serviceKey", SERVICE_KEY);
      url.searchParams.set("pageNo", "1");
      url.searchParams.set("numOfRows", "200");
      url.searchParams.set("resultType", "json");
      return url.toString();
    }

    function filterItems(keyword) {
      const q = normalizeWhitespace(keyword).toLowerCase();
      if (!q) return [...rawItems];

      return rawItems.filter((item) => {
        const source = [
          item.title,
          item.addr,
          item.menu,
          item.desc,
          item.tel,
          item.gugun
        ].join(" ").toLowerCase();
        return source.includes(q);
      });
    }

    function renderList(items) {
      els.countText.textContent = `${items.length}건`;

      if (!items.length) {
        els.restaurantList.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
        return;
      }

      els.restaurantList.innerHTML = items.map((item) => {
        const isActive = selectedItem && selectedItem.id === item.id;
        return `
          <article class="restaurant-item ${isActive ? "active" : ""}" data-id="${escapeHtml(item.id)}">
            <h3>${escapeHtml(item.title)}</h3>
            <p><span class="line-label">주소:</span> ${escapeHtml(item.addr || "주소 정보 없음")}</p>
            <p><span class="line-label">메뉴:</span> ${escapeHtml(item.menu || "대표 메뉴 정보 없음")}</p>
            <div class="item-actions">
              <button class="icon-btn" type="button" title="상세보기" aria-label="상세보기">⌕</button>
              <button class="icon-btn fav-btn" type="button" title="즐겨찾기" aria-label="즐겨찾기">♡</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderDetail(item) {
      if (!item) {
        els.detailCard.innerHTML = '<div class="empty">목록에서 맛집을 선택하면 상세 정보와 지도가 표시됩니다.</div>';
        return;
      }

      const homepageHtml = item.homepage
        ? `<a class="homepage-box" href="${escapeHtml(item.homepage)}" target="_blank" rel="noopener noreferrer">공식 홈페이지 바로가기</a>`
        : `<div class="homepage-box">공식 홈페이지 없음</div>`;

      const imageSrc = item.image || "https://placehold.co/800x650?text=BUSAN+FOOD";

      els.detailCard.innerHTML = `
        <div class="detail-top">
          <div class="photo-wrap">
            <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(item.title)}" />
            <button class="floating-fav" type="button" aria-label="즐겨찾기">♡</button>
          </div>

          <div class="info-box">
            <div class="info-row">
              <div class="info-label">상호명</div>
              <div class="info-value">${escapeHtml(item.title)}</div>
            </div>

            <div class="info-row">
              <div class="info-label">주소</div>
              <div class="info-value">${escapeHtml(item.addr || "주소 정보 없음")}</div>
            </div>

            <div class="info-row">
              <div class="info-label">소개</div>
              <div class="info-value multiline">${escapeHtml(item.desc || "소개 정보 없음")}</div>
            </div>

            <div class="info-row">
              <div class="info-label">대표메뉴</div>
              <div class="info-value">${escapeHtml(item.menu || "대표 메뉴 정보 없음")}</div>
            </div>

            <div class="info-row">
              <div class="info-label">문의</div>
              <div class="info-value">${escapeHtml(item.tel || "전화번호 정보 없음")}</div>
            </div>

            <div class="info-row">
              <div class="info-label">운영시간</div>
              <div class="info-value">${escapeHtml(item.useTime || "운영시간 정보 없음")}</div>
            </div>

            ${homepageHtml}
          </div>
        </div>

        <div class="map-card">
          <div id="map"></div>
        </div>

        <div class="meta-bar">
          현재 화면은 공공데이터 응답 필드명을 유연하게 매핑하도록 작성되어 있습니다.<br />
          실제 응답 필드가 다른 경우 normalizeItem 함수의 키 목록만 조정하면 됩니다.
        </div>
      `;

      initMapForItem(item);
    }

    async function ensureKakaoMapLoaded() {
      if (window.kakao && window.kakao.maps) {
        kakaoLoaded = true;
        return;
      }

      if (!KAKAO_JS_KEY || KAKAO_JS_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY") {
        throw new Error("카카오 JavaScript 키를 먼저 입력하세요.");
      }

      await new Promise((resolve, reject) => {
        const existing = document.querySelector('script[data-kakao="sdk"]');
        if (existing) {
          existing.addEventListener("load", () => {
            kakao.maps.load(resolve);
          });
          existing.addEventListener("error", () => reject(new Error("카카오맵 SDK를 불러오지 못했습니다.")));
          return;
        }

        const script = document.createElement("script");
        script.dataset.kakao = "sdk";
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&autoload=false`;
        script.onload = () => {
          kakao.maps.load(resolve);
        };
        script.onerror = () => reject(new Error("카카오맵 SDK를 불러오지 못했습니다."));
        document.head.appendChild(script);
      });

      kakaoLoaded = true;
    }

    async function initMapForItem(item) {
      const mapEl = document.getElementById("map");
      if (!mapEl) return;

      try {
        await ensureKakaoMapLoaded();
      } catch (error) {
        mapEl.innerHTML = `<div class="error-box">${escapeHtml(error.message)}</div>`;
        return;
      }

      const hasCoords = Number.isFinite(item.lat) && Number.isFinite(item.lng);
      const fallbackCenter = { lat: 35.1795543, lng: 129.0756416 }; // 부산시청 기준
      const center = hasCoords ? { lat: item.lat, lng: item.lng } : fallbackCenter;

      map = new kakao.maps.Map(mapEl, {
        center: new kakao.maps.LatLng(center.lat, center.lng),
        level: hasCoords ? 3 : 7
      });

      marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(center.lat, center.lng)
      });
      marker.setMap(map);

      const infowindow = new kakao.maps.InfoWindow({
        content: `<div style="padding:8px 10px;font-size:13px;white-space:nowrap;">${escapeHtml(item.title)}</div>`
      });
      infowindow.open(map, marker);
    }

    function setSelectedItem(item) {
      selectedItem = item;
      renderList(filteredItems);
      renderDetail(item);

      if (window.innerWidth <= 820) {
        els.detailPanel.classList.add("show-mobile");
      }
    }

    async function fetchFoodData() {
      if (!SERVICE_KEY || SERVICE_KEY === "YOUR_DATA_GO_KR_SERVICE_KEY") {
        throw new Error("공공데이터 서비스키를 먼저 입력하세요.");
      }

      const url = getApiUrl();
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`데이터 요청에 실패했습니다. (${response.status})`);
      }

      const contentType = response.headers.get("content-type") || "";
      const text = await response.text();

      let items = [];

      try {
        if (contentType.includes("application/json") || text.trim().startsWith("{")) {
          const json = JSON.parse(text);
          items = toArray(
            json?.getFoodKr?.item ||
            json?.getFoodKr?.items?.item ||
            json?.response?.body?.items?.item ||
            json?.items ||
            json?.data
          );
        } else {
          items = parseXmlToJson(text);
        }
      } catch (error) {
        throw new Error("응답 데이터 해석에 실패했습니다. resultType 또는 응답 구조를 확인하세요.");
      }

      rawItems = items.map(normalizeItem).filter((item) => item.title);
      filteredItems = [...rawItems];
      selectedItem = filteredItems[0] || null;

      renderList(filteredItems);
      renderDetail(selectedItem);
    }

    function applySearch() {
      filteredItems = filterItems(els.keywordInput.value);

      if (selectedItem && !filteredItems.some((item) => item.id === selectedItem.id)) {
        selectedItem = filteredItems[0] || null;
      }

      renderList(filteredItems);
      renderDetail(selectedItem);
    }

    function openError(message) {
      els.restaurantList.innerHTML = `<div class="error-box">${escapeHtml(message)}</div>`;
      els.detailCard.innerHTML = `<div class="error-box">${escapeHtml(message)}</div>`;
      els.countText.textContent = "0건";
    }

    /* ===============================
       이벤트
    =============================== */
    els.loadBtn.addEventListener("click", async () => {
      els.restaurantList.innerHTML = '<div class="loading">맛집 데이터를 불러오는 중입니다...</div>';
      els.detailCard.innerHTML = '<div class="loading">상세 정보를 준비하는 중입니다...</div>';

      try {
        await fetchFoodData();
      } catch (error) {
        openError(error.message || "데이터를 불러오지 못했습니다.");
      }
    });

    els.reloadBtn.addEventListener("click", async () => {
      els.keywordInput.value = "";
      rawItems = [];
      filteredItems = [];
      selectedItem = null;
      els.detailPanel.classList.remove("show-mobile");
      els.restaurantList.innerHTML = '<div class="loading">맛집 데이터를 다시 불러오는 중입니다...</div>';
      els.detailCard.innerHTML = '<div class="loading">상세 정보를 준비하는 중입니다...</div>';

      try {
        await fetchFoodData();
      } catch (error) {
        openError(error.message || "데이터를 다시 불러오지 못했습니다.");
      }
    });

    els.searchBtn.addEventListener("click", applySearch);
    els.keywordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applySearch();
    });

    els.restaurantList.addEventListener("click", (e) => {
      const itemEl = e.target.closest(".restaurant-item");
      if (!itemEl) return;
      const id = itemEl.dataset.id;
      const item = filteredItems.find((v) => String(v.id) === String(id));
      if (!item) return;
      setSelectedItem(item);
    });

    els.mobileCloseBtn.addEventListener("click", () => {
      els.detailPanel.classList.remove("show-mobile");
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 820) {
        els.detailPanel.classList.remove("show-mobile");
      }
    });
  </script>
</body>
</html>
