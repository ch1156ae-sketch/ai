<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>부산맛집 정보 서비스</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #efefef;
      color: #111;
    }

    :root {
      --border: #dcdcdc;
      --text-muted: #666;
      --bg: #f2f2f2;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.08);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(242, 242, 242, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 12px;
    }

    .brand {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.2;
      flex: 1;
      min-width: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .top-icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #cfcfcf;
      background: #f3f3f3;
      border-radius: 10px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #333;
      flex: 0 0 auto;
    }

    .top-icon-btn svg,
    .search-icon,
    .item-icon-svg,
    .favorite-icon-svg {
      width: 24px;
      height: 24px;
      display: block;
      stroke: currentColor;
      stroke-width: 2px;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-icon-btn.is-active {
      background: #111;
      border-color: #111;
      color: #fff;
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      height: 42px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .search-box input {
      flex: 1;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      padding: 0 14px;
      font-size: 14px;
    }

    .screen {
      position: relative;
      min-height: calc(100vh - 103px);
      padding-bottom: 84px;
    }

    .list-view {
      width: 100%;
      min-height: calc(100vh - 103px);
      background: var(--bg);
      display: block;
    }


    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }

    .list-head strong {
      font-size: 14px;
      font-weight: 800;
    }

    .list-head span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .restaurant-list {
      background: #fff;
    }

    .restaurant-item {
      position: relative;
      padding: 16px 112px 16px 20px;
      border-bottom: 1px solid #e7e7e7;
      background: #fff;
      cursor: pointer;
    }

    .restaurant-item h3 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.25;
    }

    .restaurant-item p {
      margin: 3px 0;
      font-size: 13px;
      line-height: 1.45;
      color: #222;
      word-break: keep-all;
    }

    .restaurant-item .line-label {
      font-weight: 700;
    }

    .item-icons {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    .round-icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #cfcfcf;
      background: #f3f3f3;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #333;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .round-icon-btn.is-saved,
    .favorite-float.is-saved {
      color: #fff;
      background: #000;
      border-color: #000;
    }

    .favorite-icon-svg path {
      fill: none;
      stroke: currentColor;
    }

    .favorite-float .favorite-icon-svg path {
      fill: none;
      stroke: currentColor;
    }

    .favorite-float.is-saved .favorite-icon-svg path {
      fill: currentColor;
      stroke: currentColor;
    }

    .detail-view {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--bg);
      display: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .detail-view.show {
      display: block;
    }

    .detail-inner {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 12px 20px 20px;
    }

    .detail-topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: rgba(242, 242, 242, 0.98);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #cfcfcf;
      background: #f3f3f3;
      border-radius: 10px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #333;
      flex: 0 0 auto;
    }

    .back-icon {
      width: 24px;
      height: 24px;
      display: block;
      stroke: currentColor;
      stroke-width: 2px;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .detail-title {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .photo-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 0.82;
      background: #ddd;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .favorite-float {
      position: absolute;
      top: 0;
      left: 0;
      width: 36px;
      height: 36px;
      border: 0;
      background: #000;
      border-radius: 10px;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      flex: 0 0 auto;
      z-index: 2;
    }

    .info-block {
      margin-bottom: 14px;
    }

    .info-label {
      display: inline-block;
      background: #000;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 2px 6px;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .info-value {
      font-size: 16px;
      line-height: 1.55;
      color: #222;
      word-break: keep-all;
    }

    .home-link,
    .home-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 26px;
      background: #000;
      color: #fff;
      font-size: 13px;
      text-decoration: none;
      margin: 6px 0 14px;
      cursor: pointer;
    }

    .map-wrap {
      border: 1px solid #ddd;
      background: #e8e8e8;
      overflow: hidden;
    }

    .map-action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .map-action-btn,
    .map-action-btn-disabled {
      height: 42px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .map-action-btn {
      border: 1px solid #333;
      background: #333;
      color: #fff;
      cursor: pointer;
    }

    .map-action-btn-secondary {
      border: 1px solid #cfcfcf;
      background: #fff;
      color: #333;
    }

    .map-action-btn-disabled {
      border: 1px solid #d9d9d9;
      background: #f2f2f2;
      color: #999;
      cursor: default;
      pointer-events: none;
    }

    #map {
      width: 100%;
      height: 340px;
      background: #e8e8e8;
    }

    .loading,
    .empty,
    .error-box {
      padding: 28px 20px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .meta-note {
      margin-top: 12px;
      background: #fff;
      border: 1px dashed #d0d0d0;
      padding: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .review-section {
      margin-top: 16px;
      background: #fff;
      border: 1px solid #e7e7e7;
      border-radius: 14px;
      padding: 16px;
    }

    .review-section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 800;
      color: #222;
      letter-spacing: -0.02em;
    }

    .review-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .review-textarea {
      width: 100%;
      min-height: 104px;
      resize: vertical;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      color: #333;
      background: #fff;
      outline: none;
    }

    .review-textarea::placeholder {
      color: #999;
    }

    .review-submit-btn {
      align-self: flex-end;
      min-width: 112px;
      height: 42px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #333;
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 16px;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .review-card {
      border: 1px solid #ececec;
      border-radius: 12px;
      padding: 14px;
      background: #fafafa;
    }

    .review-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .review-author {
      font-size: 15px;
      font-weight: 700;
      color: #222;
    }

    .review-date {
      font-size: 12px;
      color: #888;
      flex: 0 0 auto;
    }

    .review-rating {
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
      letter-spacing: 0.02em;
    }

    .review-content {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      word-break: keep-all;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 66px;
      background: #ffffff;
      border-top: 1px solid #d9d9d9;
      z-index: 40;
      padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 8px);
    }

    .bottom-nav-btn {
      border: 1px solid #cfcfcf;
      background: #ffffff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #333;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      height: 44px;
    }

    .bottom-nav-btn svg {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
      stroke-width: 2px;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bottom-nav-btn .heart-path-filled {
      fill: currentColor;
      stroke: currentColor;
      display: none;
    }

    .bottom-nav-btn.active {
      color: #fff;
      background: #333;
      border-color: #333;
      font-weight: 700;
    }

    .bottom-nav-btn.active .heart-path-filled {
      display: block;
    }

    .bottom-nav-btn.active .heart-path-outline {
      display: none;
    }

    .bottom-nav-label {
      font-size: 14px;
      line-height: 1;
    }

    @media (min-width: 431px) {
      body {
        padding: 0;
        background: #e9e9e9;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>부산맛집 정보 서비스</h1>
        <div class="top-actions">
          <button id="refreshBtn" class="top-icon-btn" type="button" aria-label="새로고침">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19.5 10.5A7.5 7.5 0 1 0 17 17.2"></path>
              <path d="M19.5 5.5V10.5H14.5"></path>
            </svg>
          </button>
          <button id="savedBtn" class="top-icon-btn" type="button" aria-label="저장한 맛집 보기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="search-row">
        <div class="search-box">
          <input id="keywordInput" type="text" placeholder="상호명, 메뉴, 구·군 검색" />
        </div>
        <button id="searchBtn" class="top-icon-btn" type="button" aria-label="검색">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="M16 16L21 21"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="screen">
      <section class="list-view">
        <div class="list-head">
          <strong id="listTitle">맛집 목록</strong>
          <span id="countText">0건</span>
        </div>
        <div id="restaurantList" class="restaurant-list">
          <div class="loading">부산 맛집 데이터를 불러오는 중입니다...</div>
        </div>
      </section>

      <section id="detailView" class="detail-view">
        <div class="detail-topbar">
          <button id="backBtn" class="back-btn" type="button" aria-label="뒤로가기">
            <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6L9 12L15 18"></path>
            </svg>
          </button>
          <div id="detailTitle" class="detail-title">상세 정보</div>
        </div>
        <div id="detailBody" class="detail-inner">
          <div class="empty">목록에서 맛집을 선택하면 상세 정보가 열립니다.</div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="하단 내비게이션">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <button id="bottomFoodBtn" class="bottom-nav-btn active" type="button" aria-label="맛집 보기">
          <span class="bottom-nav-label">맛집</span>
        </button>
        <button id="bottomSavedBtn" class="bottom-nav-btn" type="button" aria-label="즐겨찾기 보기">
          <span class="bottom-nav-label">즐겨찾기</span>
        </button>
      </div>
    </nav>
  </div>

  <script>
    const SERVICE_KEY = "9ed3a4e51e1b2c6a6fa6fd8b840ca532ed1526a5ab475c699f2cb44843129d20";
    const KAKAO_JS_KEY = "de00e931f26e156287da4c152c1ad4b0";
    const FOOD_API_BASE = "https://apis.data.go.kr/6260000/FoodService/getFoodKr";

    let rawItems = [];
    let filteredItems = [];
    let selectedItem = null;
    let map = null;
    let marker = null;
    let savedIds = loadSavedIds();
    let isSavedOnlyMode = false;

    const els = {
      keywordInput: document.getElementById("keywordInput"),
      searchBtn: document.getElementById("searchBtn"),
      countText: document.getElementById("countText"),
      listTitle: document.getElementById("listTitle"),
      restaurantList: document.getElementById("restaurantList"),
      detailView: document.getElementById("detailView"),
      detailTitle: document.getElementById("detailTitle"),
      detailBody: document.getElementById("detailBody"),
      backBtn: document.getElementById("backBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      savedBtn: document.getElementById("savedBtn"),
      bottomFoodBtn: document.getElementById("bottomFoodBtn"),
      bottomSavedBtn: document.getElementById("bottomSavedBtn"),
};

    function loadSavedIds() {
      try {
        const value = localStorage.getItem("busanFoodSavedIds");
        const parsed = JSON.parse(value || "[]");
        return Array.isArray(parsed) ? parsed.map(String) : [];
      } catch (error) {
        return [];
      }
    }

    function persistSavedIds() {
      localStorage.setItem("busanFoodSavedIds", JSON.stringify(savedIds));
    }

    function isSavedItem(itemId) {
      return savedIds.includes(String(itemId));
    }

    function toggleSavedItem(itemId) {
      const key = String(itemId);
      if (isSavedItem(key)) {
        savedIds = savedIds.filter((id) => id !== key);
      } else {
        savedIds = [...savedIds, key];
      }
      persistSavedIds();
      updateTopButtonState();
    }

    function updateTopButtonState() {
      els.savedBtn.classList.toggle("is-active", isSavedOnlyMode);
      els.listTitle.textContent = isSavedOnlyMode ? "저장한 맛집" : "맛집 목록";
      els.bottomFoodBtn.classList.toggle("active", !isSavedOnlyMode);
      els.bottomSavedBtn.classList.toggle("active", isSavedOnlyMode);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function pick(obj, keys, fallback = "") {
      for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== "") {
          return String(obj[key]).trim();
        }
      }
      return fallback;
    }

    function toArray(value) {
      if (Array.isArray(value)) return value;
      if (value == null) return [];
      return [value];
    }

    function normalizeWhitespace(text) {
      return String(text || "").replace(/\s+/g, " ").trim();
    }

    function parseXmlToJson(xmlText) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const parserError = xml.querySelector("parsererror");
      if (parserError) {
        throw new Error("공공데이터 XML 파싱에 실패했습니다.");
      }

      const rows = Array.from(xml.querySelectorAll("item, row"));
      return rows.map((row) => {
        const obj = {};
        Array.from(row.children).forEach((child) => {
          obj[child.tagName] = child.textContent?.trim() || "";
        });
        return obj;
      });
    }

    function normalizeItem(item, index) {
      const title = pick(item, ["MAIN_TITLE", "TITLE", "RSTR_NM", "REST_NM", "UC_SEQ", "BIZPLC_NM"], `맛집 ${index + 1}`);
      const addr = pick(item, ["ADDR1", "ADDR", "RDNMADR", "SITE_ADDR", "ADDR_OLD", "GUGUN_NM"]);
      const desc = pick(item, ["ITEMCNTNTS", "INTRODUCE", "CNTCT", "CONTENT"]);
      const menu = pick(item, ["RPRSNTV_MENU", "MAIN_MENU", "MENU", "MENU_INFO"]);
      const tel = pick(item, ["CNTCT_TEL", "CNTCTTEL", "TEL_NO", "TEL", "CONTACT"]);
      const useTime = pick(item, ["USAGE_DAY_WEEK_AND_TIME", "USAGE_DAY", "OPEN_TM", "USE_TIME"]);
      const homepage = pick(item, ["HOMEPAGE_URL", "HMPG_URL", "HOMEPAGE", "URL"]);
      const image = pick(item, ["MAIN_IMG_NORMAL", "MAIN_IMG_THUMB", "MAIN_IMG", "IMGURL", "IMAGE_URL"]);
      const lat = parseFloat(pick(item, ["LAT", "WGS84_LAT", "Y", "REFINE_WGS84_LAT"], ""));
      const lng = parseFloat(pick(item, ["LNG", "WGS84_LOGT", "X", "REFINE_WGS84_LOGT"], ""));
      const gugun = pick(item, ["GUGUN_NM", "SIGUN_NM", "DISTRICT"]);

      return {
        id: pick(item, ["UC_SEQ", "ID", "SEQ"], String(index + 1)),
        title,
        addr,
        desc,
        menu,
        tel,
        useTime,
        homepage,
        image,
        lat: Number.isFinite(lat) ? lat : null,
        lng: Number.isFinite(lng) ? lng : null,
        gugun,
        raw: item
      };
    }

    function getApiUrl() {
      const url = new URL(FOOD_API_BASE);
      url.searchParams.set("serviceKey", SERVICE_KEY);
      url.searchParams.set("pageNo", "1");
      url.searchParams.set("numOfRows", "200");
      url.searchParams.set("resultType", "json");
      return url.toString();
    }

    function getVisibleItemsByMode(items) {
      if (!isSavedOnlyMode) return [...items];
      return items.filter((item) => isSavedItem(item.id));
    }

    function renderList(items) {
      els.countText.textContent = `${items.length}건`;

      if (!items.length) {
        els.restaurantList.innerHTML = `<div class="empty">${isSavedOnlyMode ? "저장된 맛집이 없습니다." : "검색 결과가 없습니다."}</div>`;
        return;
      }

      els.restaurantList.innerHTML = items.map((item) => {
        const isSaved = isSavedItem(item.id);
        return `
          <article class="restaurant-item" data-id="${escapeHtml(item.id)}">
            <h3>${escapeHtml(item.title)}</h3>
            <p><span class="line-label">주소:</span> ${escapeHtml(item.addr || "주소 정보 없음")}</p>
            <p><span class="line-label">메뉴:</span> ${escapeHtml(item.menu || "대표 메뉴 정보 없음")}</p>
            <div class="item-icons">
              <button class="round-icon-btn item-detail-btn" type="button" data-detail-id="${escapeHtml(item.id)}" aria-label="상세보기">
                <svg class="item-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="6"></circle>
                  <path d="M16 16L21 21"></path>
                </svg>
              </button>
              <button class="round-icon-btn item-save-btn ${isSaved ? "is-saved" : ""}" type="button" data-save-id="${escapeHtml(item.id)}" aria-label="즐겨찾기">
                <svg class="favorite-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z"></path>
                </svg>
              </button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderDetail(item) {
      if (!item) {
        els.detailTitle.textContent = "상세 정보";
        els.detailBody.innerHTML = '<div class="empty">목록에서 맛집을 선택하면 상세 정보가 열립니다.</div>';
        return;
      }

      els.detailTitle.textContent = item.title || "상세 정보";
      const imageSrc = item.image || "https://placehold.co/800x650?text=BUSAN+FOOD";
      const isSaved = isSavedItem(item.id);
      const homepageUrl = (item.homepage || "").trim();
      const homepageHtml = homepageUrl
        ? `<a class="home-link" href="${escapeHtml(homepageUrl)}" target="_blank" rel="noopener noreferrer">공식 홈페이지</a>`
        : `<div class="home-empty">공식 홈페이지 없음</div>`;
      const hasCoords = Number.isFinite(item.lat) && Number.isFinite(item.lng);
      const encodedTitle = encodeURIComponent(item.title || "부산맛집");
      const mapViewUrl = hasCoords
        ? `https://map.kakao.com/link/map/${encodedTitle},${item.lat},${item.lng}`
        : "";
      const mapRouteUrl = hasCoords
        ? `https://map.kakao.com/link/to/${encodedTitle},${item.lat},${item.lng}`
        : "";
      const mapActionHtml = hasCoords
        ? `
          <div class="map-action-row">
            <a class="map-action-btn" href="${mapRouteUrl}" target="_blank" rel="noopener noreferrer">길찾기</a>
            <a class="map-action-btn map-action-btn-secondary" href="${mapViewUrl}" target="_blank" rel="noopener noreferrer">지도 크게 보기</a>
          </div>
        `
        : `
          <div class="map-action-row">
            <div class="map-action-btn-disabled">길찾기</div>
            <div class="map-action-btn-disabled">지도 크게 보기</div>
          </div>
        `;

      els.detailBody.innerHTML = `
        <div class="photo-wrap">
          <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(item.title)}" />
          <button class="favorite-float detail-save-btn ${isSaved ? "is-saved" : ""}" type="button" data-save-id="${escapeHtml(item.id)}" aria-label="즐겨찾기">
            <svg class="favorite-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z"></path>
            </svg>
          </button>
        </div>

        <div class="info-block">
          <div class="info-label">상호명</div>
          <div class="info-value">${escapeHtml(item.title)}</div>
        </div>

        <div class="info-block">
          <div class="info-label">주소</div>
          <div class="info-value">${escapeHtml(item.addr || "주소 정보 없음")}</div>
        </div>

        <div class="info-block">
          <div class="info-label">소개</div>
          <div class="info-value">${escapeHtml(item.desc || "소개 정보 없음")}</div>
        </div>

        <div class="info-block">
          <div class="info-label">대표메뉴</div>
          <div class="info-value">${escapeHtml(item.menu || "대표 메뉴 정보 없음")}</div>
        </div>

        <div class="info-block">
          <div class="info-label">문의</div>
          <div class="info-value">${escapeHtml(item.tel || "전화번호 정보 없음")}</div>
        </div>

        <div class="info-block">
          <div class="info-label">운영시간</div>
          <div class="info-value">${escapeHtml(item.useTime || "운영시간 정보 없음")}</div>
        </div>

        ${homepageHtml}

        <div class="map-wrap">
          <div id="map"></div>
        </div>

        ${mapActionHtml}

        <section class="review-section">
          <h3 class="review-section-title">리뷰</h3>
          <div class="review-form">
            <textarea class="review-textarea" placeholder="이 맛집에 대한 리뷰를 작성해보세요."></textarea>
            <button class="review-submit-btn" type="button">리뷰 작성</button>
          </div>

          <div class="review-list">
            <article class="review-card">
              <div class="review-card-head">
                <strong class="review-author">김민지</strong>
                <span class="review-date">2026.04.18</span>
              </div>
              <div class="review-rating">★★★★★</div>
              <p class="review-content">해산물이 정말 신선했고 대표메뉴가 기대 이상이었어요. 매장도 깔끔해서 부산 여행 중 다시 방문하고 싶은 맛집입니다.</p>
            </article>

            <article class="review-card">
              <div class="review-card-head">
                <strong class="review-author">박준호</strong>
                <span class="review-date">2026.04.12</span>
              </div>
              <div class="review-rating">★★★★☆</div>
              <p class="review-content">직원분들이 친절하고 음식 나오는 속도도 빨랐어요. 다만 피크 시간에는 대기가 조금 있을 수 있어서 여유 있게 방문하면 좋습니다.</p>
            </article>

            <article class="review-card">
              <div class="review-card-head">
                <strong class="review-author">이서윤</strong>
                <span class="review-date">2026.04.07</span>
              </div>
              <div class="review-rating">★★★★★</div>
              <p class="review-content">부산 현지 느낌이 잘 살아 있는 곳이었어요. 양도 넉넉하고 간도 좋아서 가족이랑 같이 가기 좋은 맛집으로 추천합니다.</p>
            </article>
          </div>
        </section>
      `;

      initMapForItem(item);
    }

    async function ensureKakaoMapLoaded() {
      if (window.kakao && window.kakao.maps) return;

      if (!KAKAO_JS_KEY || KAKAO_JS_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY") {
        throw new Error("카카오 JavaScript 키를 먼저 입력하세요.");
      }

      await new Promise((resolve, reject) => {
        const existing = document.querySelector('script[data-kakao="sdk"]');
        if (existing) {
          existing.addEventListener("load", () => kakao.maps.load(resolve));
          existing.addEventListener("error", () => reject(new Error("카카오맵 SDK를 불러오지 못했습니다.")));
          return;
        }

        const script = document.createElement("script");
        script.dataset.kakao = "sdk";
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&autoload=false`;
        script.onload = () => kakao.maps.load(resolve);
        script.onerror = () => reject(new Error("카카오맵 SDK를 불러오지 못했습니다."));
        document.head.appendChild(script);
      });
    }

    async function initMapForItem(item) {
      const mapEl = document.getElementById("map");
      if (!mapEl) return;

      try {
        await ensureKakaoMapLoaded();
      } catch (error) {
        mapEl.innerHTML = `<div class="error-box">${escapeHtml(error.message)}</div>`;
        return;
      }

      const hasCoords = Number.isFinite(item.lat) && Number.isFinite(item.lng);
      const fallbackCenter = { lat: 35.1795543, lng: 129.0756416 };
      const center = hasCoords ? { lat: item.lat, lng: item.lng } : fallbackCenter;

      map = new kakao.maps.Map(mapEl, {
        center: new kakao.maps.LatLng(center.lat, center.lng),
        level: hasCoords ? 3 : 7
      });

      marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(center.lat, center.lng)
      });
      marker.setMap(map);

      const infowindow = new kakao.maps.InfoWindow({
        content: `<div style="padding:8px 10px;font-size:13px;white-space:nowrap;">${escapeHtml(item.title)}</div>`
      });
      infowindow.open(map, marker);
    }

    function filterItems(keyword) {
      const q = normalizeWhitespace(keyword).toLowerCase();
      if (!q) return [...rawItems];

      return rawItems.filter((item) => {
        const source = [item.title, item.addr, item.menu, item.desc, item.tel, item.gugun].join(" ").toLowerCase();
        return source.includes(q);
      });
    }

    async function fetchFoodData() {
      if (!SERVICE_KEY || SERVICE_KEY === "YOUR_DATA_GO_KR_SERVICE_KEY") {
        throw new Error("공공데이터 서비스키를 먼저 입력하세요.");
      }

      const response = await fetch(getApiUrl());
      if (!response.ok) {
        throw new Error(`데이터 요청에 실패했습니다. (${response.status})`);
      }

      const contentType = response.headers.get("content-type") || "";
      const text = await response.text();
      let items = [];

      try {
        if (contentType.includes("application/json") || text.trim().startsWith("{")) {
          const json = JSON.parse(text);
          items = toArray(
            json?.getFoodKr?.item ||
            json?.getFoodKr?.items?.item ||
            json?.response?.body?.items?.item ||
            json?.items ||
            json?.data
          );
        } else {
          items = parseXmlToJson(text);
        }
      } catch (error) {
        throw new Error("응답 데이터 해석에 실패했습니다. resultType 또는 응답 구조를 확인하세요.");
      }

      rawItems = items.map(normalizeItem).filter((item) => item.title);
      filteredItems = getVisibleItemsByMode([...rawItems]);
      renderList(filteredItems);
      updateTopButtonState();

      if (filteredItems.length) {
        selectedItem = filteredItems[0];
      }
    }

    function applySearch() {
      const searchedItems = filterItems(els.keywordInput.value);
      filteredItems = getVisibleItemsByMode(searchedItems);
      renderList(filteredItems);
    }

    function showDetail(item) {
      selectedItem = item;
      renderDetail(item);
      els.detailView.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function hideDetail() {
      els.detailView.classList.remove("show");
      document.body.style.overflow = "";
    }

    function refreshCurrentList() {
      const searchedItems = filterItems(els.keywordInput.value);
      filteredItems = getVisibleItemsByMode(searchedItems);
      renderList(filteredItems);

      if (selectedItem && !filteredItems.some((item) => String(item.id) === String(selectedItem.id))) {
        hideDetail();
      }
    }

    function toggleSavedMode() {
      isSavedOnlyMode = !isSavedOnlyMode;
      updateTopButtonState();
      refreshCurrentList();
    }

    function showError(message) {
      els.restaurantList.innerHTML = `<div class="error-box">${escapeHtml(message)}</div>`;
      els.countText.textContent = "0건";
    }

    els.searchBtn.addEventListener("click", applySearch);

    els.keywordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applySearch();
    });

    els.restaurantList.addEventListener("click", (e) => {
      const saveBtn = e.target.closest(".item-save-btn");
      if (saveBtn) {
        e.stopPropagation();
        toggleSavedItem(saveBtn.dataset.saveId);
        refreshCurrentList();
        if (selectedItem && String(selectedItem.id) === String(saveBtn.dataset.saveId)) {
          renderDetail(selectedItem);
        }
        return;
      }

      const detailBtn = e.target.closest(".item-detail-btn");
      if (detailBtn) {
        e.stopPropagation();
        const item = filteredItems.find((v) => String(v.id) === String(detailBtn.dataset.detailId));
        if (!item) return;
        showDetail(item);
        return;
      }

      const itemEl = e.target.closest(".restaurant-item");
      if (!itemEl) return;
      const item = filteredItems.find((v) => String(v.id) === String(itemEl.dataset.id));
      if (!item) return;
      showDetail(item);
    });

    els.backBtn.addEventListener("click", hideDetail);

    els.refreshBtn.addEventListener("click", async () => {
      els.restaurantList.innerHTML = '<div class="loading">부산 맛집 데이터를 다시 불러오는 중입니다...</div>';
      try {
        await fetchFoodData();
      } catch (error) {
        showError(error.message || "데이터를 불러오지 못했습니다.");
      }
    });

    els.savedBtn.addEventListener("click", () => {
      toggleSavedMode();
    });

    els.bottomFoodBtn.addEventListener("click", () => {
      if (isSavedOnlyMode) {
        isSavedOnlyMode = false;
        updateTopButtonState();
        refreshCurrentList();
      }
    });

    els.bottomSavedBtn.addEventListener("click", () => {
      if (!isSavedOnlyMode) {
        isSavedOnlyMode = true;
        updateTopButtonState();
        refreshCurrentList();
      }
    });

    els.detailBody.addEventListener("click", (e) => {
      const detailSaveBtn = e.target.closest(".detail-save-btn");
      if (detailSaveBtn) {
        toggleSavedItem(detailSaveBtn.dataset.saveId);
        refreshCurrentList();
        if (selectedItem) {
          renderDetail(selectedItem);
        }
        return;
      }

      const reviewSubmitBtn = e.target.closest(".review-submit-btn");
      if (reviewSubmitBtn) {
        alert("리뷰는 로그인 후 작성해주세요.");
        return;
      }
    });

    updateTopButtonState();

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        await fetchFoodData();
      } catch (error) {
        showError(error.message || "데이터를 불러오지 못했습니다.");
      }
    });
  </script>
</body>
</html>
