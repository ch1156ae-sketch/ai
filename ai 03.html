<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그렇게 사랑합니다</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #7dcf7d;
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 40px 40px 60px 40px;
    }

    h1 {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .author {
      text-align: right;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .stanza1 {
      margin-bottom: 40px;
      line-height: 1.4;
    }

    .stanza2 {
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.4;
    }

    .stanza3 {
      text-align: right;
      line-height: 1.4;
    }

    p {
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <h1>그렇게 사랑합니다.</h1>

  <p class="author">-한용운-</p>

  <p class="stanza1">
    사랑한다는 사랑앞에서는<br>
    사랑 한다는말을 안합니다.<br>
    안하는것이아니라<br>
    못하는것이 사랑의 진실입니다.
  </p>

  <p class="stanza2">
    잊어버려야 하겠다는 말은<br>
    잊을수 없다는말입니다.<br>
    정말 잊고싶을 때는 말이 없습니다.
  </p>

  <p class="stanza3">
    헤어질때 돌아보지 않는것은<br>
    너무 헤어지기 싫기때문입니다.<br>
    그것은 헤어지는것이 아니라<br>
    같이 있다는 말입니다.
  </p>

</body>
</html>
