<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>절대반지는?</title>
  <style>
    body {
      margin: 0;
      background-color: #ffffff;
      font-family: '맑은 고딕', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    }

    .wrapper {
      width: 887px;
      height: 325px;
      margin: 0 auto;
      background-color: #ffffff;
      overflow: hidden;
    }

    .container {
      width: 430px;
      margin: 0 auto;
      text-align: center;
      padding-top: 2px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: bold;
      color: #ff0000;
      line-height: 1.2;
    }

    .line-box {
      display: inline-block;
      text-align: center;
    }

    p {
      margin: 0;
      font-size: 13px;
      line-height: 2.25;
      font-weight: normal;
      display: block;
    }

    .line1 { color: #c97832; }
    .line2 { color: #3a3ab6; }
    .line3 { color: #d6c04d; }
    .line4 { color: #c97832; }
    .line5 { color: #3a3ab6; }
    .line6 { color: #d6c04d; }
    .line7 { color: #c97832; }
    .line8 { color: #3a3ab6; }

    .line-hr {
      border: none;
      border-top: 1px solid #a9a9a9;
      width: 100%;
      margin: 0;
    }

    .full {
      width: 100%;
      margin: 0 auto;
    }

    .attribution {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #2c6b1f;
      font-style: italic;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <h1>절대반지는?</h1>

      <div class="line-box">
        <p class="line1">반지 세 개는 하늘 아래 요정왕들을 위한 것,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box">
        <p class="line2">일곱 개는 돌의 전당에 있는 난쟁이 군주들을 위한 것,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box">
        <p class="line3">아홉 개는 죽은 운명의 인간을 위한 것,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box">
        <p class="line4">하나는 암흑의 왕좌에 앉은 암흑 제왕을 위한 것,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box">
        <p class="line5">그곳은 망령들이 누워 있는 모르도르의 땅,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box">
        <p class="line6">그 모든 반지를 다스릴 반지하나, 그 모든 반지를 찾기 위한 절대반지,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box">
        <p class="line7">그 모든 반지를 암흑 속에 가두기 위한 반지는 절대반지뿐,</p>
        <hr class="line-hr">
      </div>

      <div class="line-box" style="display:block;">
        <p class="line8">바로 망령들이 누워 있는 모르도르의 땅에</p>
      </div>
      <hr class="line-hr full">

      <p class="attribution">반지의 제왕 중에서...</p>
    </div>
  </div>
</body>
</html>
