<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style3.css">
</head>
<body>
    <form action="">
        <fieldset>
            <legend>신청과목</legend>
            <p>이 달에 신청할 과목을 선택하세요 (1과목만 가능)</p>
            <ol>
                <li>
                    <input type="radio" name="subject" checked id="talk">
                    <label for="talk">회화</label>

                    <input type="radio" name="subject" id="rule">
                    <label for="rule">문법</label>

<input type="radio" name="subject" id="make">
<label for="make">작문</label>
                </li>
            </ol>
        </fieldset>
        <fieldset>
            <legend>메일링</legend>
            <p>메일로 받고 싶은 뉴스 주제를 선택해 주세요(복수선택가능)</p>
            <ol>
                <li>
                    <input type="checkbox" name="grobal" checked id="grobal" value="해외단신"><label for="">해외단신</label>
                    <input type="checkbox" name="5m" id="5m" value="5분 회화"><label for="">5분 회화</label>
                    <input type="checkbox" name="morning" id="morning" value="모닝팝스"><label for="">모닝팝스</label>
                </li>
            </ol>
        </fieldset>
    </form>
</body>
</html>
