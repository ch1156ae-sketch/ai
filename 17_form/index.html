<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>[폼 구성 요소 알아보기]</h1>
    <!--데이터 전송 방식 method get-->
    <!--데이터 전송 방식 method post-->
    <form action="" name="login" method="POST">
    <fieldset>
        <legend>로그인화면</legend>
        <ol>
            <li>
                <label for="idinput">ID</label>
                <input type="text" class="idbox" name="id" id="idinput" placeholder="아이디또는전화번호" />
            </li>
            <li>
                <!--장애자를 위한 웹 접근성 코딩-->
                <label for="pwbox">PASSWORD</label>
                <input type="password" name="pw" id="pwbox" placeholder="비밀번호" />
            </li>
        </ol>
        
    </fieldset>
    <!--서버로 데이터를 전송-->
    <input type="submit" value="로그인"/>
    <!--입력한 data 초기화-->
    <input type="reset" value="다시입력"/>
    </form>

    <form action="" name="my" method="POST">
        <fieldset>
            <legend>개인산상정보</legend>
            <ul>
                <li>
                    <input type="radio" name="gender" id="man" /><label for="">남자</label>
                    <input type="radio" name="gender" checked id="woman"/><label for="">여자</label>
                    <input type="radio" name="gender" /><label for="">중성자</label>
                </li>
                <li>
                    <label for="tour">여행</label>
                    <input type="checkbox" checked id="tour" name="chk"value="여행" />
                    <label for="movie">영화</label>
                    <input type="checkbox" id="movie" value="영화" />
                    <label for="book">독서</label>
                    <input type="checkbox" id="book" value="독서" />
                </li>
                <li>
                    <label for="color">칼라선택</label>
                    <select name="colorlist" id="color">
                        <option>::::: 색상선택 :::::</option>
                        <option value="빨강">빨간색</option>
                        <option value="초록">녹색</option>
                        <option value="파랑">파란색</option>
                    </select>
                </li>
                <li>
                    <label for="ms">MESSAGE</label>
                    <!--여러줄을 입력 받을때-->
                    <textarea name="msg" id="" cols="60" rows="20">문의 사항 작성</textarea>
                </li>
                <li>
                    <label for="">파일첨부</label>
                    <input type="file" id="file" name="file"/>
                </li>
                <li>
                    <label for="col">색상선택</label>
                    <input type="color" name="color" id="col"/>
                </li>
                <li>
                    <label for="ddd">예약날짜</label>
                    <input type="date" name="data" id="ddd"/>
                </li>
                <li>
                    <label for="">예약시간</label>
                    <input type="time" name="time" id="time"/>
                </li>
                <li>
                    <label for="dt">날짜/시간예약</label>
                    <input type="datetime-local" name="datetime" id="dt" />
                </li>
                <li>
                    <label for="ml">리스트목록(다중선택)</label>
                    <select name="multiselect" id="ml" multiple>
                        <option>사이즈를 선택하세요</option>
                        <option value="44">44</option>
                        <option value="55">55</option>
                        <option value="66">66</option>
                        <option value="77">77</option>
                    </select>

                </li>
           </ul>
        </fieldset>
        <input type="submit" value="가입"/>
        <input type="reset" value="다시입력"/>

    </form>
</body>
</html>
