<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시안 레이아웃 구현</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e9e9e9;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
    }

    .top-box {
      width: 1200px;
      height: 150px;
      margin: 0 auto;
      background: #cfcfcf;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0;
    }

    .top-item {
      width: 350px;
    }

    .search {
      height: 60px;
      background: #ff1a12;
    }

    .logo {
      height: 70px;
      background: #16ff4b;
    }

    .right {
      height: 90px;
      background: #6a5b0b;
    }

    .top-item1 {
      background: #ff1a12;
    }

    .top-item2 {
      background: #16ff4b;
    }

    .top-item3 {
      background: #6a5b0b;
    }

    .bar {
      width: 100%;
      height: 450px;
      background: #c500a0;
    }

    .content {
      width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    .content-box1 {
      width: 100%;
      height: 1000px;
      background: #efe08a;
      padding: 0 0;
    }

    .content-box2 {
      width: 100%;
      height: 600px;
      background: #1e8be8;
    }

    .content-box3 {
      width: 100%;
      height: 1000px;
      background: #ff6168;
    }

    .content-box4 {
      width: 100%;
      height: 200px;
      background: #d97be9;
    }

    .content-box5 {
      width: 100%;
      height: 1000px;
      background: #b73a00;
    }

    .bottom-box {
      width: 1200px;
      height: 200px;
      background: #ffd400;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0;
    }

    .bottom-box1{
      width: 385px;
      height: 125px;
      background: #f57171;
    }
    .bottom-box2{
      width: 775px;
      height: 125px;
      background: #2a87b3;
    }
  </style>
</head>
<body>
  <header class="top-box">
    <div class="top-item search"></div>
    <div class="top-item logo"></div>
    <div class="top-item right"></div>
  </header>

  <section class="bar"></section>

  <main class="content">
    <div class="content-box1"></div>
    <div class="content-box2"></div>
    <div class="content-box3"></div>
    <div class="content-box4"></div>
    <div class="content-box5"></div>
  </main>

  <footer class="bottom-box">
    <div class="bottom-box1"></div>
    <div class="bottom-box2"></div>
    </footer>
</body>
</html>
