<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>한국의 사계</title>
  <style>
    body {
      margin: 0;
      background-color: #b6d86c; /* 연한 연두색 배경 */
      font-family: 'Malgun Gothic', sans-serif;
      text-align: center;
    }

    .container {
      width: 800px;
      margin: 0 auto;
      padding-top: 40px;
    }

    h1 {
      color: #3b5d1f;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .line {
      width: 500px;
      height: 4px;
      background-color: #2f2f2f;
      margin: 0 auto 30px;
    }

    .menu a {
      display: block;
      text-decoration: none;
      color: black;
      font-size: 18px;
      margin: 10px 0;
    }

    .menu a:first-child {
      color: blue;
      text-decoration: underline;
    }

    .bottom-line {
      width: 500px;
      height: 4px;
      background-color: #2f2f2f;
      margin: 30px auto;
    }

    footer {
      font-size: 14px;
      color: #000;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>한국의 사계</h1>

    <div class="line"></div>

    <div class="menu">
      <a href="#">봄의 계절</a>
      <a href="#">여름의 계절</a>
      <a href="#">가을의 계절</a>
      <a href="#">겨울의 계절</a>
    </div>

    <div class="bottom-line"></div>

    <footer>
      Copyright©hyejin 2020 All Reserved.
    </footer>
  </div>

</body>
</html>
