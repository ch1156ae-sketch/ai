<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1913, initial-scale=1.0" />
  <title>봄의 계절</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background-color: #FFB3F4;
    }

    .wrap {
      width: 100%;
      text-align: center;
      padding-top: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 28px;
      color: #970148;
    }

    .image-box {
      width: 500px;
      margin: 0 auto;
    }

    .line {
      width: 500px;
      height: 5px;
      background-color: #353532;
      border: none;
      margin: 0 auto;
    }

    /* ⭐ 수정 핵심 */
    .image-box a {
      display: block;
    }

    .photo {
      display: block;
      width: 500px;
      height: auto; /* 비율 유지 */
      margin: 18px auto;
    }

    .home-link {
      display: inline-block;
      margin-top: 18px;
      font-size: 16px;
      color: #5b0033;
      text-decoration: none;
    }

    .home-link:hover {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>봄의 계절</h1>

    <div class="image-box">
      <hr class="line" />

      <a href="ai_index.html">
        <img
          class="photo"
          src="./images/spring.jpg"
          alt="봄의 계절 이미지"
        />
      </a>

      <hr class="line" />
    </div>

    <a href="ai_index.html" class="home-link">[메인화면으로 이동]</a>
  </div>
</body>
</html>
