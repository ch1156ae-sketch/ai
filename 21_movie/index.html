<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동영상삽입</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>홍보 / 마케팅 동영상</h1>
    <hr>
    <!-- 이미지삽입 -->
    <div class="imgbox">
        <img src="./images/img5.png" alt="샘플이미지">
    </div>
    <!-- 동영상 삽입 loop는 반복재생-->
     <div class="movi_wrap">
        <div class="movi">
           <video autoplay muted loop controls="true">
               <source src="./movi/sample1.mp4" type="video/mp4">
           </video>
        </div>
        <div class="movi">
           <video autoplay muted loop>
               <source src="./movi/sample2.mp4" type="video/mp4">
           </video>
        </div>
        <div class="movi">
           <video autoplay muted loop>
               <source src="./movi/sample3.mp4" type="video/mp4">
           </video>
        </div>
        <div class="movi">
           <video autoplay muted loop>
               <source src="./movi/sample4.mp4" type="video/mp4">
           </video>
        </div>
     </div>
     <!-- 유튜브 영상 삽입 -->
     <div class="youtube">
        <iframe
        src="https://www.youtube.com/embed/oyCgVDf7p7c?si=vUSgC0QI7B01Wf5S" 
        title="YouTube video player" 
        frameborder="0" 
        allow="
        accelerometer;
        autoplay; 
        clipboard-write; 
        encrypted-media; 
        gyroscope; 
        picture-in-picture; 
        web-share" 
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
     </div>
</body>
</html>
