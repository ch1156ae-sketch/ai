<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>장바구니 - UTBT</title>
        <link
            rel="stylesheet"
            href="./css/common.css"
        />
        <link
            rel="stylesheet"
            href="./css/components/header.css"
        />
        <link
            rel="stylesheet"
            href="./css/components/bottom-nav.css"
        />
        <link
            rel="stylesheet"
            href="./css/pages/cart.css"
        />
        <!-- 카카오 지도 API 키는 YOUR_KAKAO_APP_KEY 부분만 실제 키로 교체하세요. -->
        <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=de00e931f26e156287da4c152c1ad4b0&libraries=services"></script>
    </head>
    <body>
        <section
            class="mobile-app"
            aria-label="장바구니 - UTBT 모바일 화면"
        >
            <div
                id="appHeader"
                class="header-slot"
            ></div>
            <main
                class="cart-page app-page"
                aria-label="장바구니 페이지"
            >
                <section class="cart-page-content">
                    <section
                        class="cart-shipping-card"
                        aria-label="배송지 정보"
                    >
                        <div class="cart-shipping-top">
                            <span class="shipping-badge">새벽배송</span>
                        </div>
                        <div class="shipping-address-row">
                            <p class="shipping-address"></p>
                            <button
                                type="button"
                                class="shipping-change-btn"
                            >
                                변경
                            </button>
                        </div>
                    </section>
                    <section
                        class="cart-list-card"
                        aria-label="장바구니 상품 목록"
                    >
                        <div class="cart-select-row">
                            <button
                                type="button"
                                class="cart-check-label cart-select-all-btn"
                                aria-label="전체선택"
                            >
                                <span class="cart-check"></span
                                ><span>전체선택</span></button
                            ><button
                                type="button"
                                class="cart-delivery-filter"
                            >
                                새벽배송
                            </button>
                        </div>
                        <h2 class="cart-delivery-title">새벽배송</h2>
                        <ul class="cart-items"></ul>
                    </section>
                    <button
                        type="button"
                        class="cart-buy-fixed"
                        aria-label="구매하기"
                    >
                        구매하기
                    </button>
                </section>
                <div
                    class="address-modal"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="addressPopupTitle"
                >
                    <div class="address-popup">
                        <h2
                            class="address-popup-title"
                            id="addressPopupTitle"
                        >
                            배송지 관리
                        </h2>
                        <div class="address-current-card">
                            <span class="address-current-label"
                                >기본 배송지</span
                            >
                            <p class="address-current-text"></p>
                        </div>
                        <button
                            type="button"
                            class="address-location-btn"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"
                                />
                                <circle
                                    cx="12"
                                    cy="10"
                                    r="2.5"
                                /></svg
                            ><span>현위치로 설정</span>
                        </button>
                        <div class="address-map-panel">
                            <div
                                id="addressMap"
                                class="address-map"
                                aria-label="배송지 선택 지도"
                            ></div>
                            <p class="address-map-guide">
                                지도를 클릭해서 배송지를 선택할 수 있어요.
                            </p>
                            <p class="address-selected-text">
                                선택된 주소가 없습니다.
                            </p>
                            <div class="address-map-actions">
                                <button
                                    type="button"
                                    class="address-map-close-btn"
                                >
                                    지도 닫기</button
                                ><button
                                    type="button"
                                    class="address-map-apply-btn"
                                >
                                    선택 위치 적용
                                </button>
                            </div>
                        </div>
                        <div class="address-form">
                            <div class="address-field">
                                <label for="addressMainInput">주소</label
                                ><input
                                    type="text"
                                    id="addressMainInput"
                                />
                            </div>
                            <div class="address-field">
                                <label for="addressDetailInput">상세주소</label
                                ><input
                                    type="text"
                                    id="addressDetailInput"
                                />
                            </div>
                        </div>
                        <div class="address-actions">
                            <button
                                type="button"
                                class="address-cancel-btn"
                            >
                                취소</button
                            ><button
                                type="button"
                                class="address-save-btn"
                            >
                                저장
                            </button>
                        </div>
                    </div>
                </div>
            </main>
            <button
                type="button"
                class="scroll-top-btn"
                aria-label="장바구니 맨 위로 이동"
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M12 19V5" />
                    <path d="m5 12 7-7 7 7" />
                </svg>
            </button>
            <div
                id="appBottomNav"
                class="bottom-nav-slot"
            ></div>
        </section>
        <script>
            window.UTBT_PAGE = "home";
            window.UTBT_HEADER = { title: "장바구니", backHref: "index.html" };
        </script>
        <script src="./js/components/header.js"></script>
        <script src="./js/components/bottom-nav.js"></script>
        <script src="./js/data.js"></script>
        <script src="./js/common.js"></script>
        <script src="./js/pages/cart.js"></script>
    </body>
</html>
