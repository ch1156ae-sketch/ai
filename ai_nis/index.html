<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메인 비주얼 섹션</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #ffffff;
      color: #111;
    }

    .hero {
      position: relative;
      width: 100%;
      min-width: 1280px;
      min-height: 860px;
      background: linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.18)),
        url("./images/bg_about.jpg") no-repeat center center / cover;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.00) 40%, rgba(0,0,0,0.06) 100%);
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 2;
      width: 1280px;
      margin: 0 auto;
      padding-top: 235px;
    }

    .headline {
      font-size: 60px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: -2px;
      color: #ffffff;
      margin-bottom: 62px;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
    }

    .card-list {
      width: 1280px;
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .card {
      width: 400px;
      height: 284px;
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.16);
    }

    .card-image {
      width: 100%;
      height: 224px;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      transition: transform 0.5s ease;
    }

    .card:nth-child(1) .card-image {
      background-image: url("./images/img_about_1.jpg");
    }

    .card:nth-child(2) .card-image {
      background-image: url("./images/img_about_2.png");
    }

    .card:nth-child(3) .card-image {
      background-image: url("./images/img_about_3.jpg");
    }

    .card:hover .card-image {
      transform: scale(1.2);
    }

    .card-title {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-size: 22px;
      font-weight: 700;
      color: #222222;
      letter-spacing: -0.4px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="inner">
      <h1 class="headline">
        안전하고 평화로운 대한민국을 위해<br>
        국가정보원이 함께합니다.
      </h1>

      <div class="card-list">
        <div class="card">
          <div class="card-image"></div>
          <div class="card-title">직무</div>
        </div>

        <div class="card">
          <div class="card-image"></div>
          <div class="card-title">국정원 역사</div>
        </div>

        <div class="card">
          <div class="card-image"></div>
          <div class="card-title">관련 법령</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
