<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>이름없는 함수2</title>
    </head>
    <body>
        <script>
            let irum = function (name) {
                document.write(`${name}님 환영합니다!<br>`);
            };

            irum("홍길동");
        </script>
    </body>
</html>
