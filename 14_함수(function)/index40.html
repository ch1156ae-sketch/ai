<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>함수(return)</title>
    </head>
    <body>
        <script>
            // return ->값을 반환(돌려줌)한다, 함수를 중지할 때
            //  return문만 있을 때 함수가 중지
            //  return 반환할 변수

            // 제곱근을 구하는 함수
            // 매개변수: 숫자data
            // return 값은 계산된 결과를 호출한 명령에 되돌리기

            function sqr(x) {
                // let result = x * x;
                // return result;
                return x * x;
            }

            document.write(sqr(10));
        </script>
    </body>
</html>
