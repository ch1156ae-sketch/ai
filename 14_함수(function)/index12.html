<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>화살표함수3</title>
    </head>
    <body>
        <script>
            let city = (name, count) => {
                for (let i = 1; i <= count; i++) {
                    document.write(`여기는 ${name}입니다<br>`);
                }
            };

            city("서울", 5);
            city("부산", 4);
            city("제주", 3);
            city("전주", 2);
        </script>
    </body>
</html>
