<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>함수 선언 및 실행</title>
        <link
            rel="stylesheet"
            href="./css/style.css"
        />
    </head>
    <body>
        <script>
            // 함수(컴포넌트)를 선언하는(만드는) 방법
            function test() {
                //실행할 함수 기능 코딩
                alert("안녕하세요?");
            }
            // 만든 함수를 실행하는 방법
            test();
            test();
        </script>
    </body>
</html>
