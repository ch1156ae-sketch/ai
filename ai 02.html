<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage</title>
    <style>
        h1 {
            text-align: center;
            color: #008600;
        }

        p {
            text-align: center;
        }

        .mail {
            color: red;
        }

        h2 {
            color: #008600;
            margin: 0; /* hr과 간격 충돌 방지 */
            white-space: nowrap;
        }

        .h2-wrapper {
            display: inline-block;
            text-align: center;
        }

        .h2-wrapper hr {
            width: 100%;
            height: 5px;
            background-color: #0100FB;
            border: none;
            margin: 5px 0; /* 위아래 간격 5px */
        }

        .h2-center {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>이채린의 홈페이지에 오신 것을 환영합니다.</h1>

    <p>
        멋진 홈페이지가 되도록 노력하겠습니다.
        <br>부디 저의 홈페이지에서 좋은 시간 가지시기 바라며
        <br>가실 때에 따뜻한 글한마디 남겨주시면 감사하겠습니다.
    </p>

    <p>
        그리고 제 홈페이지에 궁금한 점이 있으시면
        <br><em><ins class="mail">xxxxx@naver.com</ins></em>으로
        <br>메일 보내주시기 바랍니다.
    </p>

    <p>2020년 7월 30일</p>

    <div class="h2-center">
        <div class="h2-wrapper">
            <hr />
            <h2>KD 아카데미 강의실에서</h2>
            <hr />
        </div>
    </div>
</body>
</html>
