<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리바이스상품</title>
    <style>
        p{
            text-align: center;
        }
    </style>
</head>
<body>
    <p id="top">
        <img src="images/levis.jpg" alt="메인화면" usemap="#main">
        <map name="main">
            <area shape="rect" coords="11,48,275,697" href="#style1" alt="1">
            <area shape="rect" coords="287, 46, 570, 700" href="#style2" alt="2">
            <area shape="rect" coords="576, 45, 878, 698" href="#style3" alt="3">
        </map>        
    </p>
    <p id="style1">
        <img src="images/levis1.jpg" alt="1번스타일" usemap="#st1">
        <map name="st1"><area shape="circle" coords="803,5305, 42 " href="#top" alt="위로"></map>   
             
    </p>
    <p id="style2">
        <img src="images/levis2.jpg" alt="2번스타일" usemap="#st2">    
        <map name="st2"><area shape="circle" coords="807,6560, 42 " href="#top" alt="위로"></map>     
    </p>
    <p id="style3">
        <img src="images/levis3.jpg" alt="3번스타일" usemap="#st3">
        <map name="st3"><area shape="circle" coords="805, 5945, 42 " href="#top" alt="위로"></map>     
    </p>
</body>
</html>
