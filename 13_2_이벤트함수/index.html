<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>이벤트 함수</title>
        <link
            rel="stylesheet"
            href="./css/style.css"
        />
    </head>
    <body>
        <button id="btn1">부드럽게 사리지기</button>
        <button id="btn2">부드럽게 보이기</button>
        <button id="btn3">보이기/ 숨기기</button>

        <button id="btn8">애니메이션2</button>
        <button id="btn9">class추가</button>
        <button id="btn10">class삭제</button>
        <hr />
        <div class="box1">
            <div id="fadebox">fadein/fadeout</div>
            <div id="fadetogglebox">fadetoggle</div>
        </div>
        <div class="box2">
            <div
                id="up"
                class="box slide-box"

                slideUp/ down
            </div>

                id="slidetogglebox"
                class="box slide-box"
            >
                slidetoggle
            </div>
            <div
                id="anim"
                class="ani"
            >
                animation
            </div>
        </div>
        <div class="box3">
            <div>class추가(addclass())</div>
            <div>class삭제(removeclass())</div>
        </div>
