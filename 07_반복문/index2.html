<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반복문</title>
</head>
<body>
    <script>
        //배열
        let girl = ["태연","써니","티파니","효연","유리","수영","윤아","서현"]
        //반복문 사용하여 배열에 있는 값 출력
        for(let i=0; i < girl.length; i++){
            document.write(girl[i]+"<br>");
        }
        console.log(girl);
    </script>
</body>
</html>
