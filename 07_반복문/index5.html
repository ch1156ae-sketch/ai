<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <label for="">월</label>
    <select name="" id="">
        <option value="1">1월</option>
        <option value="2">2월</option>
        <option value="3">3월</option>
        <option value="4">4월</option>
        <option value="5">5월</option>
        <option value="6">6월</option>
        <option value="7">7월</option>
        <option value="8">8월</option>
        <option value="9">9월</option>
        <option value="10">10월</option>
        <option value="11">11월</option>
        <option value="12">12월</option>
    </select>
    <label for="">출생일:</label>
    <select name="" id="">
    <option value="01">1일</option>
    <option value="02">2일</option>
    <option value="03">3일</option>
    <option value="04">4일</option>
    <option value="05">5일</option>
     <option value="06">6일</option>
    <option value="07">7일</option>
    <option value="08">8일</option>
    <option value="09">9일</option>
    <option value="10">10일</option>
    <option value="11">11일</option>
    <option value="12">12일</option>
    <option value="13">13일</option>
    <option value="14">14일</option>
    <option value="15">15일</option>
    <option value="16">16일</option>
    <option value="17">17일</option>
    <option value="18">18일</option>
    <option value="19">19일</option>
    <option value="20">20일</option>
    <option value="21">21일</option>
    <option value="22">22일</option>
    <option value="23">23일</option>
    <option value="24">24일</option>
    <option value="25">25일</option>
    <option value="26">26일</option>
    <option value="27">27일</option>
    <option value="28">28일</option>
    <option value="29">29일</option>
    <option value="30">30일</option>
    <option value="31">31일</option>
    </select>
    <label for="">출생년도:</label>
    <select name="" id="">
        <option value="">1900년도</option>
    </select>
    <hr>
    <label for="">출생월:</label>
    <script>
        // 1-12월까지 목록상자
        let output= "<select>";
            for( let i=1; i<=12; i++){
                output= output + "<option>"+i+ "월"+ "</option>";
            }
            output= output + "</select>";
            document.write(output);
    </script>
    <label for="">출생일:</label>
    <script>
        let output2= "<select>";
            for( let i=1; i<=31; i++){
                output2= output2 + "<option>"+i+ "일"+ "</option>";
            }
            output2= output2 + "</select>";
            document.write(output2);
    </script>
    <label for="">출생년도:</label>
    <script>
        let output3= "<select>";
            for( let i=2026; i>=1900; i--){
                output3= output3 + "<option>"+i+ "년도"+ "</option>";
            }
            output3= output3 + "</select>";
            document.write(output3);
    </script>
</body>
</html>
