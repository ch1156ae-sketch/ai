<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cambak 로그인</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f5f5;
      --primary: #5b74ba;
      --primary-dark: #4e67ae;
      --text: #5b74ba;
      --line: #d2d2d2;
      --muted: #6f7ba5;
      --white: #ffffff;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: #222;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 100px 24px 40px;
      background: var(--bg);
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 128px;
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-text {
      margin-top: 4px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #2f5ea8;
      display: none;
    }

    .login-form {
      width: 100%;
    }

    .field {
      position: relative;
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }

    .field input {
      width: 100%;
      height: 34px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      outline: none;
      font-size: 16px;
      color: #222;
      padding: 0 2px 8px;
    }

    .field input::placeholder {
      color: transparent;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: var(--white);
    }

    .btn-primary:active {
      background: var(--primary-dark);
    }

    .btn-outline {
      border: 1.5px solid var(--primary);
      background: transparent;
      color: var(--primary);
    }

    .sub-links {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #384B7B;
      font-weight: 400;
    }

    .sub-links a {
      color: inherit;
      text-decoration: none;
    }

    .divider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 32px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .divider-row::before,
    .divider-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #9dafdc;
    }

    .social-list {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
    }

    .social-btn {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .social-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .hidden-icons {
      display: none;
    }

    @media (max-width: 360px) {
      .app {
        padding-left: 18px;
        padding-right: 18px;
      }

      .sub-links {
        gap: 16px;
        font-size: 13px;
      }

      .btn {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="logo-wrap" aria-label="서비스 로고">
      <div class="logo-mark">
        <img src="./images/login_logo.png" alt="Cambak 로고" />
      </div>
    </section>

    <form class="login-form" id="loginForm">
      <div class="field">
        <label class="field-label" for="userId">아이디</label>
        <input type="text" id="userId" name="userId" placeholder="아이디" autocomplete="username" />
      </div>

      <div class="field">
        <label class="field-label" for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호" autocomplete="current-password" />
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">로그인</button>
        <button type="button" class="btn btn-outline" id="signupBtn">회원가입</button>
      </div>

      <nav class="sub-links" aria-label="보조 메뉴">
        <a href="#">아이디 찾기</a>
        <span>|</span>
        <a href="#">비밀번호 찾기</a>
        <span>|</span>
        <a href="#">둘러보기</a>
      </nav>

      <div class="divider-row">간편로그인</div>

      <div class="social-list" aria-label="소셜 로그인">
        <button type="button" class="social-btn" data-provider="카카오" aria-label="카카오 로그인">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="36" height="36" rx="2" fill="#FEE500"/>
            <path d="M18 9.5C12.48 9.5 8 12.99 8 17.29C8 20 9.8 22.39 12.54 23.81L11.55 27.44C11.46 27.79 11.85 28.06 12.15 27.87L16.54 24.96C17.02 25.02 17.5 25.05 18 25.05C23.52 25.05 28 21.56 28 17.29C28 12.99 23.52 9.5 18 9.5Z" fill="#191600"/>
          </svg>
        </button>

        <button type="button" class="social-btn" data-provider="네이버" aria-label="네이버 로그인">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="36" height="36" rx="2" fill="#1EC800"/>
            <path d="M21.79 18.94L14.13 8H10V28H14.21V17.06L21.87 28H26V8H21.79V18.94Z" fill="white"/>
          </svg>
        </button>

        <button type="button" class="social-btn" data-provider="구글" aria-label="구글 로그인">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="36" height="36" rx="4" fill="#4B5563"/>
            <path d="M25.89 18.37C25.89 17.72 25.83 17.1 25.72 16.5H18V19.67H22.41C22.22 20.69 21.64 21.56 20.76 22.14V24.2H23.41C24.96 22.77 25.89 20.66 25.89 18.37Z" fill="#4285F4"/>
            <path d="M18 26.38C20.21 26.38 22.05 25.65 23.41 24.2L20.76 22.14C20.03 22.63 19.09 22.92 18 22.92C15.87 22.92 14.07 21.48 13.43 19.54H10.69V21.66C12.05 24.37 14.85 26.38 18 26.38Z" fill="#34A853"/>
            <path d="M13.43 19.54C13.27 19.05 13.18 18.53 13.18 18C13.18 17.47 13.27 16.95 13.43 16.46V14.34H10.69C10.13 15.45 9.82 16.7 9.82 18C9.82 19.3 10.13 20.55 10.69 21.66L13.43 19.54Z" fill="#FBBC05"/>
            <path d="M18 13.08C19.19 13.08 20.25 13.49 21.09 14.28L23.47 11.9C22.05 10.6 20.21 9.62 18 9.62C14.85 9.62 12.05 11.63 10.69 14.34L13.43 16.46C14.07 14.52 15.87 13.08 18 13.08Z" fill="#EA4335"/>
          </svg>
        </button>

        <button type="button" class="social-btn" data-provider="페이스북" aria-label="페이스북 로그인">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="36" height="36" rx="2" fill="#4267B2"/>
            <path d="M20.22 28V19.31H23.14L23.58 15.93H20.22V13.77C20.22 12.79 20.49 12.13 21.89 12.13H23.7V9.11C22.82 9.01 21.94 8.96 21.06 8.96C18.46 8.96 16.68 10.55 16.68 13.47V15.93H13.77V19.31H16.68V28H20.22Z" fill="white"/>
          </svg>
        </button>
      </div>
    </form>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const signupBtn = document.getElementById('signupBtn');
    const socialButtons = document.querySelectorAll('.social-btn');

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!userId) {
        alert('아이디를 입력해주세요.');
        document.getElementById('userId').focus();
        return;
      }

      if (!password) {
        alert('비밀번호를 입력해주세요.');
        document.getElementById('password').focus();
        return;
      }

      alert('로그인 요청이 전송되었습니다.');
    });

    signupBtn.addEventListener('click', function () {
      alert('회원가입 페이지로 이동합니다.');
    });

    socialButtons.forEach(function (button) {
      button.addEventListener('click', function () {
        const provider = button.dataset.provider;
        alert(provider + ' 로그인 기능을 연결해주세요.');
      });
    });
  </script>
</body>
</html>
