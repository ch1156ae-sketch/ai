<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>캠핑 홈</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --primary: #5976c9;
      --primary-dark: #4d68b4;
      --text: #202124;
      --muted: #6f7480;
      --line: #d7dbea;
      --chip-bg: #e9edf7;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      display: flex;
      justify-content: center;
      cursor: grab;
    }

    body.is-page-dragging {
      cursor: grabbing;
    }

    .app {
      width: 100%;
      max-width: 375px;
      min-height: 812px;
      background: #ffffff;
      padding-bottom: 94px;
      position: relative;
      touch-action: pan-y;
    }


    .hero {
      position: relative;
      width: 100%;
      height: 285px;
      overflow: hidden;
      background: #d9dfe9;
      touch-action: pan-y;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }

    .hero.is-dragging {
      cursor: grabbing;
    }

    .hero-slider {
      display: flex;
      width: 100%;
      height: 100%;
      will-change: transform;
      transition: transform 0.45s ease-in-out;
      touch-action: pan-y;
    }

    .hero-slide {
      min-width: 100%;
      width: 100%;
      flex: 0 0 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .hero-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-pagination {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 2;
    }

    .hero-page-track {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      flex-shrink: 0;
    }

    .hero-page-track.is-active {
      width: 18px;
      background: #ffffff;
    }

    .section {
      padding: 24px 24px 0;
    }

    .hero + .section {
      padding-top: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #506BB0;
      line-height: 1.3;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      column-gap: 10px;
      row-gap: 24px;
    }

    .category-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      text-decoration: none;
      color: inherit;
    }

    .category-emoji {
      width: 42px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .category-emoji img {
      width: 42px;
      height: 36px;
      display: block;
      object-fit: contain;
    }

    .category-label {
      font-size: 15px;
      font-weight: 400;
      color: #595959;
      line-height: 1.2;
      text-align: center;
      word-break: keep-all;
    }

    .benefit-row {
      display: flex;
      align-items: center;
      gap: 24px;
      width: 100%;
      margin-top: 24px;
    }

    .benefit-chip {
      width: calc((100% - 48px) / 3);
      height: 40px;
      border-radius: 10px;
      background: var(--chip-bg);
      color: #506BB0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .benefit-chip .icon {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .benefit-chip .icon img {
      width: 24px;
      height: 24px;
      display: block;
      object-fit: contain;
    }

    .ranking-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ranking-card {
      overflow: hidden;
      background: #ddd;
      height: 204px;
    }

    .ranking-card img,
    .wide-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .wide-card {
      margin-top: 24px;
      width: 100%;
      height: 196px;
      overflow: hidden;
      background: #ddd;
    }

    .place-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 24px;
    }

    .place-title {
      font-size: 18px;
      font-weight: 700;
      color: #141414;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .bookmark-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bookmark-btn svg {
      width: 24px;
      height: 24px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.9;
    }

    .address {
      font-size: 13px;
      font-weight: 400;
      color: #454545;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .action-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      height: 48px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      flex-shrink: 0;
    }

    .btn-primary {
      width: 184px;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
    }

    .btn-primary:active {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-outline {
      width: 124px;
      background: #fff;
      color: #202124;
      border: 1.5px solid #7f99da;
    }

    .btn-outline:active {
      background: #f5f7ff;
    }

        .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 375px;
      height: 70px;
      padding-bottom: 0;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 30;
    }

    .nav-item {
      width: 62px;
      height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #666666;
      font-size: 11px;
      font-weight: 600;
      padding: 0;
      border: 0;
      background: none;
      cursor: pointer;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: color 0.2s ease;
    }

    .nav-item:hover {
      color: #5d78c8;
    }

    .nav-item:not(.active):active,
    .nav-item:not(.active):focus,
    .nav-item:not(.active):focus-visible {
      color: #666666;
      outline: none;
    }

    .nav-item.active {
      color: #5d78c8;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: block;
      flex-shrink: 0;
    }

    .nav-icon img {
      width: 24px;
      height: 24px;
      display: block;
      object-fit: contain;
      filter: grayscale(1) brightness(0.45);
      transition: filter 0.2s ease;
    }

    .nav-item:hover .nav-icon img,
    .nav-item.active .nav-icon img {
      filter: brightness(0) saturate(100%) invert(49%) sepia(29%) saturate(857%) hue-rotate(186deg) brightness(92%) contrast(87%);
    }

    .nav-item:not(.active):active .nav-icon img,
    .nav-item:not(.active):focus .nav-icon img,
    .nav-item:not(.active):focus-visible .nav-icon img {
      filter: grayscale(1) brightness(0.45);
    }

    @media (max-width: 360px) {
      .hero {
        height: 285px;
      }

      .section {
        padding-left: 24px;
        padding-right: 24px;
      }

      .address,
      .benefit-chip {
        font-size: 13px;
      }

      .action-row {
        gap: 12px;
      }
    }
  </style>
</head>
<body>

        <div class="hero-slide">

  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=de00e931f26e156287da4c152c1ad4b0&libraries=services"></script>
  <script>
    const heroSlider = document.getElementById('heroSlider');
    const heroTracks = document.querySelectorAll('.hero-page-track');
    const bookmarkBtn = document.getElementById('bookmarkBtn');
    const routeBtn = document.getElementById('routeBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const homeTabBtn = document.getElementById('go-home-tab');
    const searchTabBtn = document.getElementById('go-search-tab');
    const myTabBtn = document.getElementById('go-my-tab');
    const groupTabBtn = document.getElementById('go-group-tab');
    const liveTabBtn = document.getElementById('go-live-tab');

    let bookmarked = false;
    let currentSlide = 1;
    const realSlideCount = 3;
    const app = document.querySelector('.app');
    const heroSection = document.querySelector('.hero');
    let heroAutoSlide = null;
    let dragStartX = 0;
    let dragCurrentX = 0;
    let dragStartY = 0;
    let dragCurrentY = 0;
    let dragStartScrollY = 0;
    let isPointerDown = false;
    let isDragging = false;
    let isHorizontalSwipe = false;
    let isVerticalScroll = false;

    let isPagePointerDown = false;
    let isPageDragging = false;
    let pageDragStartY = 0;
    let pageDragStartScrollY = 0;

    function updateHeroIndicator(index) {
      const visualIndex = (index - 1 + realSlideCount) % realSlideCount;
      heroTracks.forEach((track, i) => {
        track.classList.toggle('is-active', i === visualIndex);
      });
    }

    function updateHeroSlider(index, useTransition = true) {
      const slideWidth = document.querySelector('.hero').clientWidth;
      heroSlider.style.transition = useTransition ? 'transform 0.45s ease-in-out' : 'none';
      heroSlider.style.transform = `translate3d(-${index * slideWidth}px, 0, 0)`;
      updateHeroIndicator(index);
    }

    function startHeroAutoSlide() {
      stopHeroAutoSlide();
      heroAutoSlide = setInterval(() => {
        currentSlide += 1;
        updateHeroSlider(currentSlide);
      }, 3000);
    }

    function stopHeroAutoSlide() {
      if (heroAutoSlide) {
        clearInterval(heroAutoSlide);
        heroAutoSlide = null;
      }
    }

    function handleHeroSwipeMove(clientX, clientY) {
      if (!isPointerDown) return;

      dragCurrentX = clientX;
      dragCurrentY = clientY;

      const deltaX = dragCurrentX - dragStartX;
      const deltaY = dragCurrentY - dragStartY;

      if (!isHorizontalSwipe && !isVerticalScroll) {
        if (Math.abs(deltaX) > 6 || Math.abs(deltaY) > 6) {
          if (Math.abs(deltaX) > Math.abs(deltaY)) {
            isHorizontalSwipe = true;
          } else {
            isVerticalScroll = true;
            heroSection.classList.remove('is-dragging');
          }
        }
      }

      if (isVerticalScroll) {
        window.scrollTo({ top: dragStartScrollY - deltaY, behavior: 'auto' });
        return;
      }

      if (!isHorizontalSwipe) return;

      const slideWidth = heroSection.clientWidth;
      if (Math.abs(deltaX) > 4) {
        isDragging = true;
      }

      heroSlider.style.transition = 'none';
      heroSlider.style.transform = `translate3d(${-(currentSlide * slideWidth) + deltaX}px, 0, 0)`;
    }

    function handleHeroSwipeEnd() {
      if (!isPointerDown) return;

      const deltaX = dragCurrentX - dragStartX;
      const threshold = 50;
      isPointerDown = false;
      heroSection.classList.remove('is-dragging');

      if (isHorizontalSwipe && Math.abs(deltaX) > threshold) {
        if (deltaX < 0) {
          currentSlide += 1;
        } else {
          currentSlide -= 1;
        }
      }

      updateHeroSlider(currentSlide, true);
      isDragging = false;
      isHorizontalSwipe = false;
      isVerticalScroll = false;
      startHeroAutoSlide();
    }

    window.addEventListener('load', () => {
      updateHeroSlider(currentSlide, false);
    });

    window.addEventListener('resize', () => {
      updateHeroSlider(currentSlide, false);
    });

    heroSection.addEventListener('pointerdown', (event) => {
      isPointerDown = true;
      isDragging = false;
      isHorizontalSwipe = false;
      isVerticalScroll = false;
      dragStartX = event.clientX;
      dragCurrentX = event.clientX;
      dragStartY = event.clientY;
      dragCurrentY = event.clientY;
      dragStartScrollY = window.scrollY;
      heroSection.classList.add('is-dragging');
      heroSlider.style.transition = 'none';
    });

    heroSection.addEventListener('pointermove', (event) => {
      if (!isPointerDown) return;

      const nextDeltaX = event.clientX - dragStartX;
      const nextDeltaY = event.clientY - dragStartY;

      if (!isHorizontalSwipe && !isVerticalScroll && (Math.abs(nextDeltaX) > 6 || Math.abs(nextDeltaY) > 6)) {
        if (Math.abs(nextDeltaX) > Math.abs(nextDeltaY)) {
          stopHeroAutoSlide();
        }
      }

      handleHeroSwipeMove(event.clientX, event.clientY);
    });

    heroSection.addEventListener('pointerup', handleHeroSwipeEnd);
    heroSection.addEventListener('pointercancel', handleHeroSwipeEnd);
    heroSection.addEventListener('pointerleave', () => {
      if (isPointerDown) {
        handleHeroSwipeEnd();
      }
    });

    startHeroAutoSlide();

    heroSlider.addEventListener('transitionend', () => {
      if (currentSlide === realSlideCount + 1) {
        currentSlide = 1;
        updateHeroSlider(currentSlide, false);
      }

      if (currentSlide === 0) {
        currentSlide = realSlideCount;
        updateHeroSlider(currentSlide, false);
      }
    });

    function shouldSkipPageDrag(target) {
      return Boolean(target.closest('.hero, .bottom-nav, button, a, input, textarea, select, label'));
    }

    app.addEventListener('pointerdown', (event) => {
      if (shouldSkipPageDrag(event.target)) return;
      isPagePointerDown = true;
      isPageDragging = false;
      pageDragStartY = event.clientY;
      pageDragStartScrollY = window.scrollY;
    });

    app.addEventListener('pointermove', (event) => {
      if (!isPagePointerDown) return;
      const deltaY = event.clientY - pageDragStartY;

      if (Math.abs(deltaY) > 4) {
        isPageDragging = true;
        document.body.classList.add('is-page-dragging');
        window.scrollTo({ top: pageDragStartScrollY - deltaY, behavior: 'auto' });
      }
    });

    function endPageDrag() {
      isPagePointerDown = false;
      isPageDragging = false;
      document.body.classList.remove('is-page-dragging');
    }

    app.addEventListener('pointerup', endPageDrag);
    app.addEventListener('pointercancel', endPageDrag);
    app.addEventListener('pointerleave', () => {
      if (isPagePointerDown) {
        endPageDrag();
      }
    });

    function setBookmarkState(isActive) {
      bookmarked = isActive;
      const path = bookmarkBtn.querySelector('path');
      path.setAttribute('fill', bookmarked ? '#5976c9' : 'none');
      bookmarkBtn.setAttribute('aria-pressed', String(bookmarked));
    }

    bookmarkBtn.addEventListener('click', () => {
      setBookmarkState(!bookmarked);
    });

    const destinationName = '치악산 1번지';
    const destinationAddress = '강원도 원주시 치악면 치악산 1번지';

    function openKakaoDirections() {
      if (!window.kakao || !window.kakao.maps || !window.kakao.maps.services) {
        alert('카카오맵 SDK 키를 먼저 넣어주세요.');
        return;
      }

      const geocoder = new kakao.maps.services.Geocoder();

      geocoder.addressSearch(destinationAddress, (result, status) => {
        if (status !== kakao.maps.services.Status.OK || !result.length) {
          alert('목적지 좌표를 찾을 수 없습니다. 주소를 확인해주세요.');
          return;
        }

        const destLng = result[0].x;
        const destLat = result[0].y;

        const openDirectionUrl = (fromLat, fromLng) => {
          const fromName = encodeURIComponent('내 위치');
          const toName = encodeURIComponent(destinationName);
          window.open(
            `https://map.kakao.com/link/from/${fromName},${fromLat},${fromLng}/to/${toName},${destLat},${destLng}`,
            '_blank'
          );
        };

        const openDestinationUrl = () => {
          const toName = encodeURIComponent(destinationName);
          window.open(
            `https://map.kakao.com/link/to/${toName},${destLat},${destLng}`,
            '_blank'
          );
        };

        if (!navigator.geolocation) {
          openDestinationUrl();
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude } = position.coords;
            openDirectionUrl(latitude, longitude);
          },
          () => {
            openDestinationUrl();
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          }
        );
      });
    }

    routeBtn.addEventListener('click', () => {
      openKakaoDirections();
    });

    cancelBtn.addEventListener('click', () => {
      setBookmarkState(false);
      alert('북마크가 해제되었습니다.');
    });

    homeTabBtn.addEventListener('click', () => {
      window.location.href = 'main.html';
    });

    searchTabBtn.addEventListener('click', () => {
      window.location.href = 'search.html';
    });

    myTabBtn.addEventListener('click', () => {
      window.location.href = 'my.html';
    });

    groupTabBtn.addEventListener('click', () => {
      // 모임 화면 이동
    });

    liveTabBtn.addEventListener('click', () => {
      // LIVE 화면 이동
    });
  </script>
</body>
