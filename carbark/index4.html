<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cambak Splash</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #ffffff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 48px;
      background: #ffffff;
    }

    .logo-wrap {
      width: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease both;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #123f8c;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      text-align: center;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .subtitle {
      font-size: 13px;
      line-height: 1.5;
      color: #5a6f95;
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    .loader-area {
      width: 100%;
      max-width: 260px;
      animation: fadeUp 0.8s 0.35s ease both;
    }

    .loader-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(31, 87, 181, 0.12);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(31, 87, 181, 0.06);
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2e6ae6 0%, #143f9d 100%);
      transition: width 0.1s linear;
    }

    .progress-text {
      margin-top: 12px;
      font-size: 12px;
      color: #3b578c;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="splash">
    <div class="logo-wrap">
      <img src="./images/logo.png" alt="Cambak 로고" />
    </div>

    <h1 class="title">캠박으로 이동 중입니다</h1>
    <p class="subtitle">잠시만 기다려 주세요.<br />서비스를 불러오고 있습니다.</p>

    <div class="loader-area">
      <div class="loader-track">
        <div class="loader-bar" id="loaderBar"></div>
      </div>
      <p class="progress-text" id="progressText">0%</p>
    </div>
  </main>

  <script>
    const loaderBar = document.getElementById('loaderBar');
    const progressText = document.getElementById('progressText');

    const duration = 3000;
    const startTime = performance.now();

    function animateProgress(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const percent = Math.floor(progress * 100);

      loaderBar.style.width = percent + '%';
      progressText.textContent = percent + '%';

      if (progress < 1) {
        requestAnimationFrame(animateProgress);
      } else {
        progressText.textContent = '100%';
        window.location.href = 'index5.html';
      }
    }

    requestAnimationFrame(animateProgress);
  </script>
</body>
</html>
