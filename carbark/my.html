<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY 페이지</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --muted: #6f6f6f;
      --line: #e6e6e6;
      --primary: #5d78c8;
      --chip-gray: #969696;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      font: inherit;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 375px;
      height: 812px;
      background: var(--bg);
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .top-bar .left,
    .top-bar .right {
      width: 36px;
      display: flex;
      align-items: center;
    }

    .top-bar .center {
      flex: 1;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .content {
      height: calc(100% - 48px - 70px);
      overflow-y: auto;
      padding-bottom: 0;
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar {
      display: none;
    }

    .saved-header {
      padding: 24px 24px 12px;
      background: var(--bg);
    }

    .saved-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .saved-list {
      padding: 8px 0 0;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .result-thumb {
      width: 99px;
      height: 99px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: #ddd;
    }

    .result-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .result-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 99px;
    }

    .result-top {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .result-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .result-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-top: 2px;
    }

    .result-address {
      margin-top: 4px;
      color: #222;
      font-size: 13px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .bookmark-btn {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .bookmark-btn svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .bookmark-btn path {
      fill: var(--primary);
      stroke: var(--primary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .result-meta {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .tag {
      padding: 6px 10px 7px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      flex: 0 0 auto;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .distance {
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      letter-spacing: -0.02em;
      margin-top: 2px;
    }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 375px;
      height: 70px;
      padding-bottom: 0;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 30;
    }

    .nav-item {
      width: 62px;
      height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #666666;
      font-size: 11px;
      font-weight: 600;
      padding: 0;
      border: 0;
      background: none;
      cursor: pointer;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: color 0.2s ease;
    }

    .nav-item:hover {
      color: #5d78c8;
    }

    .nav-item.active {
      color: #5d78c8;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: block;
      flex-shrink: 0;
    }

    .nav-icon img {
      width: 24px;
      height: 24px;
      display: block;
      object-fit: contain;
      filter: grayscale(1) brightness(0.45);
      transition: filter 0.2s ease;
    }

    .nav-item:hover .nav-icon img,
    .nav-item.active .nav-icon img {
      filter: brightness(0) saturate(100%) invert(49%) sepia(29%) saturate(857%) hue-rotate(186deg) brightness(92%) contrast(87%);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="left"></div>
      <div class="center">MY</div>
      <div class="right"></div>
    </div>

    <div class="content">
      <div class="saved-header">
        <div class="saved-title">저장한 장소</div>
      </div>
      <div class="saved-list" id="saved-list"></div>
    </div>

    <!-- 홈바 -->
    <nav class="bottom-nav">
      <button class="nav-item" id="go-home-tab" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img src="./images/home.svg" alt="" />
        </span>
        <span>홈</span>
      </button>

      <button class="nav-item" id="go-search-tab" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img src="./images/search.svg" alt="" />
        </span>
        <span>검색</span>
      </button>

      <button class="nav-item" id="go-group-tab" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img src="./images/community.svg" alt="" />
        </span>
        <span>모임</span>
      </button>

      <button class="nav-item" id="go-live-tab" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img src="./images/live.svg" alt="" />
        </span>
        <span>LIVE</span>
      </button>

      <button class="nav-item active" id="go-my-tab" type="button">
        <span class="nav-icon" aria-hidden="true">
          <img src="./images/user.svg" alt="" />
        </span>
        <span>MY</span>
      </button>
    </nav>
  </div>

  <script>
    const BOOKMARK_KEY = "camp_bookmarks_cache";
    const PLACE_DATA_KEY = "camp_place_data_cache";
    const CURRENT_LAT_KEY = "camp_current_lat";
    const CURRENT_LNG_KEY = "camp_current_lng";

    const savedListEl = document.getElementById("saved-list");
    const homeTabBtn = document.getElementById('go-home-tab');
    const searchTabBtn = document.getElementById('go-search-tab');
    const myTabBtn = document.getElementById('go-my-tab');
    const groupTabBtn = document.getElementById('go-group-tab');
    const liveTabBtn = document.getElementById('go-live-tab');

    function getBookmarkIcon() {
      return `
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 3.5H17C17.83 3.5 18.5 4.17 18.5 5V19.5L12 16L5.5 19.5V5C5.5 4.17 6.17 3.5 7 3.5Z"></path>
        </svg>
      `;
    }

    function getSavedPlaceData() {
      try {
        return JSON.parse(localStorage.getItem(PLACE_DATA_KEY)) || [];
      } catch {
        return [];
      }
    }

    function getSavedBookmarks() {
      try {
        return JSON.parse(localStorage.getItem(BOOKMARK_KEY)) || [];
      } catch {
        return [];
      }
    }

    function getCurrentLocation() {
      const lat = Number(localStorage.getItem(CURRENT_LAT_KEY));
      const lng = Number(localStorage.getItem(CURRENT_LNG_KEY));
      return {
        lat: Number.isFinite(lat) ? lat : null,
        lng: Number.isFinite(lng) ? lng : null
      };
    }

    function getCaptionTags(place) {
      const sourceTags = (place.keywords && place.keywords.length ? place.keywords : place.tags || [])
        .map(tag => String(tag).replace(/^#/, "").trim())
        .filter(Boolean);

      if (!sourceTags.length) return [];
      const longTags = sourceTags.filter(tag => tag.length > 3);
      if (longTags.length) return [longTags[0]];
      return sourceTags.slice(0, 2);
    }

    function getDistanceKm(lat1, lng1, lat2, lng2) {
      const toRad = (deg) => deg * Math.PI / 180;
      const earthRadiusKm = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadiusKm * c;
    }

    function getPlaceDistanceText(place) {
      const current = getCurrentLocation();
      if (typeof current.lat === "number" && typeof current.lng === "number") {
        const distanceKm = getDistanceKm(current.lat, current.lng, place.lat, place.lng);
        return distanceKm < 1 ? `${Math.round(distanceKm * 1000)}m` : `${distanceKm.toFixed(1)}km`;
      }
      return place.distance || "거리 확인중";
    }

    function renderSavedList() {
      const places = getSavedPlaceData();
      const bookmarkIds = new Set(getSavedBookmarks());
      const savedPlaces = places.filter(place => bookmarkIds.has(place.id));

      if (!savedPlaces.length) {
        savedListEl.innerHTML = '<div class="empty-state">저장한 장소가 없습니다.<br />검색 결과에서 북마크를 눌러 저장해보세요.</div>';
        return;
      }

      savedListEl.innerHTML = savedPlaces.map(place => `
        <article class="result-item">
          <div class="result-thumb">
            <img src="${place.thumb}" alt="${place.name}" />
          </div>
          <div class="result-body">
            <div class="result-top">
              <div class="result-title-wrap">
                <div class="result-title">${place.name}</div>
                <div class="result-address">${place.address}</div>
              </div>
              <button class="bookmark-btn" type="button" aria-label="북마크">${getBookmarkIcon()}</button>
            </div>
            <div class="result-meta">
              <div class="tag-list">
                ${getCaptionTags(place).map(tag => `<span class="tag">${tag}</span>`).join("")}
              </div>
              <div class="distance">${getPlaceDistanceText(place)}</div>
            </div>
          </div>
        </article>
      `).join("");
    }

    function setActiveNav(targetBtn) {
      document.querySelectorAll('.nav-item').forEach((item) => {
        item.classList.toggle('active', item === targetBtn);
      });
    }

    homeTabBtn.addEventListener('click', () => {
      setActiveNav(homeTabBtn);
      window.location.href = 'main.html';
    });

    searchTabBtn.addEventListener('click', () => {
      setActiveNav(searchTabBtn);
      window.location.href = 'search.html';
    });

    myTabBtn.addEventListener('click', () => {
      setActiveNav(myTabBtn);
      window.location.href = 'my.html';
    });

    groupTabBtn.addEventListener('click', () => {
      setActiveNav(groupTabBtn);
      // 모임 화면 이동
    });

    liveTabBtn.addEventListener('click', () => {
      setActiveNav(liveTabBtn);
      // LIVE 화면 이동
    });

    renderSavedList();
  </script>
</body>
</html>
