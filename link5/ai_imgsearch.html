<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검색엔진(이미지)</title>
  <style>
    body {
      margin: 0;
      font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      text-align: center;
    }

    .wrap {
      width: 420px;
      margin: 20px auto;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 24px;
    }

    /* hr 공통 */
    hr {
      border: none;
      height: 2px;
      background-color: #b53a3a;
    }

    /* 위, 가운데 hr */
    .top-line,
    .mid-line {
      width: 200px;
      margin: 20px auto;
    }

    /* 마지막 hr */
    .bottom-line {
      width: 400px;
      margin: 20px auto;
    }

    .logo-list a {
      display: block;
      margin: 12px 0;
    }

    .logo-list img {
      width: 200px;
    }

    .text-link a {
      color: purple;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>검색엔진(이미지)</h1>
    <hr class="top-line" />

    <div class="logo-list">
      <!-- 네이버 -->
      <a href="https://www.naver.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/23/Naver_Logotype.svg" alt="네이버">
      </a>

      <!-- 다음 -->
      <a href="https://www.daum.net" target="_blank">
        <img src="./images/daum.svg" alt="다음">
      </a>

      <!-- 구글 -->
      <a href="https://www.google.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="구글">
      </a>
    </div>

    <hr class="mid-line" />

    <p class="text-link">
      <a href="./ai_search.html" target="_blank">[검색엔진(문자)로 가기]</a>
    </p>

    <hr class="bottom-line" />

    <p>CopyWrite © 이호연 닷컴 All Right</p>
  </div>
</body>
</html>
