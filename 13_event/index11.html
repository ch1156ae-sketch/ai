<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>javascript</title>
        <link
            rel="stylesheet"
            href="./css/style.css"
        />
    </head>
    <body>
        <h1>javascript함수</h1>
        <button id="btn1">숨김</button>
        <button id="btn2">보이기</button>
        <button id="btn3">토글</button>
        <button id="btn4">늘리기</button>
        <button id="btn5">줄이기</button>
        <hr />
        <div class="box">
            <div class="orange">보이기/ 숨김</div>
            <div class="lightblue">토글</div>
            <div class="lightpurple">가로/세로 크기</div>
        </div>
        <!-- 스크립트 라이브러리 연결 (jquery 리이브러리) -->
        <script src="./script/jquery-4.0.0.js"></script>
        <script>
            // 준비 작업 필수
            $(function () {
                //css명령
                $("#btn1").css({ width: "100px", height: "200px" });
                // 숨기기
                $("#btn1").mouseenter(function () {
                    $(".orange").hide();
                });

                // 보이기
                $("#btn2").mouseenter(function () {
                    $(".orange").show();
                });

                // 토글
                $("#btn3").mouseenter(function () {
                    $(".lightblue").toggle();
                });

                // 늘리기
                $("#btn4").mouseenter(function () {
                    $(".lightpurple").width("600px");
                    $(".lightpurple").height("600px");
                });
                $("#btn5").mouseenter(function () {
                    $(".lightpurple").width("200px");
                    $(".lightpurple").height("200px");
                });
            });
        </script>
    </body>
</html>
