<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1400" />
  <title>Claude Header</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: 'Noto Sans KR', sans-serif;
      min-width: 1400px;
      /* 요소들이 수직으로 쌓이도록 변경하고 가운데 정렬 */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header-area {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 10; /* 헤더 영역이 이미지 섹션보다 위로 오도록 설정 */
    }

    .header {
      width: 1400px;
      height: 80px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: relative;
    }

    .header::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100vw;
      height: 1px;
      background: #C8C8C8;
      pointer-events: none;
    }

    /* ── GNB li: 서브메뉴 기준점 ── */
    .gnb li {
      position: relative;
    }

    /* ── 세로형 서브메뉴 ── */
    .submenu-wrap {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      background: #ffffff;
      border: 1px solid #C8C8C8;
      border-top: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
      z-index: 100;
    }

    .submenu-inner {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .submenu-inner a {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 62px;
      text-decoration: none;
      color: #333333;
      background: #ffffff;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      border-bottom: 1px solid #e8e8e8;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .submenu-inner a:last-child {
      border-bottom: none;
    }

    .submenu-inner a:hover {
      color: #ffffff;
      background: #D97757;
    }

    /* hover 시 서브메뉴 표시 */
    .about-item:hover .submenu-about,
    .submenu-about:hover,
    .products-item:hover .submenu-products,
    .submenu-products:hover,
    .partnership-item:hover .submenu-partnership,
    .submenu-partnership:hover {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* ── 로고 ── */
    .logo {
      width: 160px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo img {
      width: 160px;
      height: 35px;
      display: block;
      object-fit: contain;
    }

    /* ── GNB ── */
    .gnb {
      width: 787px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
      flex-shrink: 0;
      margin-left: 80px;
      margin-right: auto;
    }

    .gnb li {
      height: 80px;
    }

    .gnb a {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      padding: 0 6px;
      text-decoration: none;
      color: #2f2f2f;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .gnb a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      background: #D97757;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    /* 기존 코드에서 글자색이 흰색으로 덮어씌워지던 부분 수정 */
    .gnb a:hover {
      color: #ffffff; 
    }

    .gnb a:hover::after {
      opacity: 1;
    }

    /* 서브메뉴 열릴 때 GNB 항목도 활성 상태 유지 */
    .about-item:hover > a,
    .products-item:hover > a,
    .partnership-item:hover > a {
      color: #D97757;
    }
    .about-item:hover > a::after,
    .products-item:hover > a::after,
    .partnership-item:hover > a::after {
      opacity: 1;
    }

    /* ── UTIL 버튼 ── */
    .util {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }

    .util a {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .btn-store {
      width: 91px;
      height: 39px;
      background: #333333;
    }

    .btn-global {
      width: 106px;
      height: 39px;
      background: #D97757;
    }

    /* ── 추가된 메인 이미지 섹션 (Hero Section) ── */
    .hero-section {
      width: 100%;
      height: 800px;
    }
  </style>
</head>
<body>
  <div class="header-area">
    <header class="header">
      <h1 class="logo">
        <a href="#">
          <!-- 로고 이미지가 없는 경우를 대비해 텍스트 추가 (선택사항) -->
            <img src="images/Logo.png" alt="로고">
        </a>
      </h1>

      <ul class="gnb">
        <li class="about-item">
          <a href="#">ABOUT</a>
          <div class="submenu-wrap submenu-about">
            <div class="submenu-inner">
              <a href="#">대표 인사말</a>
              <a href="#">기업소개</a>
              <a href="#">비주얼 아이덴티티</a>
              <a href="#">사회공헌</a>
              <a href="#">오시는 길</a>
            </div>
          </div>
        </li>
        <li class="products-item">
          <a href="#">PRODUCTS</a>
          <div class="submenu-wrap submenu-products">
            <div class="submenu-inner">
              <a href="#">AI &amp; 인공지능</a>
              <a href="#">Sonnet 모델</a>
              <a href="#">Coding Pro</a>
              <a href="#">대표적인 Ai</a>
            </div>
          </div>
        </li>
        <li class="partnership-item">
          <a href="#">PARTNERSHIP</a>
          <div class="submenu-wrap submenu-partnership">
            <div class="submenu-inner">
              <a href="#">가맹점 현황</a>
              <a href="#">가맹점 개설 안내</a>
              <a href="#">가맹점 개설 문의</a>
              <a href="#">제휴 문의</a>
            </div>
          </div>
        </li>
        <li><a href="#">EDUCATION</a></li>
        <li><a href="#">WHAT'S NEW</a></li>
        <li><a href="#">SUPPORT</a></li>
      </ul>

      <div class="util">
        <a href="#" class="btn-store">매장찾기</a>
        <a href="#" class="btn-global">클로드마켓</a>
      </div>
    </header>
  </div>
  
  <!-- 새롭게 추가된 섹션 -->
  <div class="hero-section">
    <img src="images/main visual.png" alt="메인">
  </div>

</body>
</html>
