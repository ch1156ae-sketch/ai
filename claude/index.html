<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Claude Header</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      min-width: 1920px;
    }

    .header {
      width: 1920px;
      height: 80px;
      margin: 0 auto;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 292px;
      border-bottom: 1px solid #C8C8C8;
    }

    .logo {
      width: 160px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo img {
      width: 160px;
      height: 35px;
      display: block;
      object-fit: contain;
    }

    .gnb {
      width: 787px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
      flex-shrink: 0;
      margin-left: 80px;
      margin-right: auto;
    }

    .gnb li {
      height: 80px;
    }

    .gnb a {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      padding: 0 6px;
      text-decoration: none;
      color: #2f2f2f;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .gnb a::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 55px;
      height: 5px;
      background: #D97757;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .gnb a:hover {
      color: #D97757;
    }

    .gnb a:hover::after {
      opacity: 1;
    }

    .util {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }

    .util a {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    /* 매장찾기 */
    .btn-store {
      width: 91px;
      height: 39px;
      background: #333333;
    }

    /* 클로드마켓 */
    .btn-global {
      width: 106px;
      height: 39px;
      background: #D97757;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="logo">
      <a href="#">
        <img src="images/Logo.png" alt="Claude logo">
    </a>
    </h1>

    <ul class="gnb">
      <li><a href="#">ABOUT</a></li>
      <li><a href="#">PRODUCTS</a></li>
      <li><a href="#">PARTNERSHIP</a></li>
      <li><a href="#">EDUCATION</a></li>
      <li><a href="#">WHAT’S NEW</a></li>
      <li><a href="#">SUPPORT</a></li>
    </ul>

    <div class="util">
      <a href="#" class="btn-store">매장찾기</a>
      <a href="#" class="btn-global">클로드마켓</a>
    </div>
  </header>
</body>
</html>
