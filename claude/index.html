<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1400" />
  <title>Claude Header</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: 'Noto Sans KR', sans-serif;
      min-width: 1400px;
      display: flex;
      justify-content: center;
    }

    .header {
      width: 1400px;
      height: 80px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: relative;
    }

    .header::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100vw;
      height: 1px;
      background: #C8C8C8;
      pointer-events: none;
    }

    .header-area {
      position: relative;
    }

    .submenu-wrap {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 70px;
      background: #ffffff;
      border-bottom: 1px solid #C8C8C8;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
      z-index: 10;
    }

    /*
      GNB 레이아웃 계산:
      - 헤더 패딩 좌측: 40px
      - 로고 너비: 160px
      - 로고~GNB 마진: 80px
      → GNB 시작점(1400px 기준 중앙): 40 + 160 + 80 = 280px
        (하지만 헤더는 body 중앙 정렬이므로 서브메뉴 inner도 1400px 컨테이너 기준으로 계산)

      GNB 너비: 787px, justify-content: space-between, 항목 6개
      항목 간격: (787 - 각 항목 너비) / 5 로 균등 배분됨
      
      실측 기준 각 항목 중심 X (1400px 내):
      - ABOUT:       ~280px (첫 항목 좌측)
      - PRODUCTS:    ~413px
      - PARTNERSHIP: ~546px
      
      submenu-inner padding-left = 해당 항목 좌측 X
      ABOUT:       286px (원본 유지)
      PRODUCTS:    413px → 약 413px
      PARTNERSHIP: 546px → 약 546px
    */

    .submenu-inner {
      width: 1400px;
      height: 70px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 64px;
    }

    /* ABOUT 서브메뉴 */
    .submenu-about .submenu-inner {
      padding-left: 286px;
    }

    /* PRODUCTS 서브메뉴 */
    .submenu-products .submenu-inner {
      padding-left: 413px;
    }

    /* PARTNERSHIP 서브메뉴 */
    .submenu-partnership .submenu-inner {
      padding-left: 546px;
    }

    .submenu-inner a {
      text-decoration: none;
      color: #333333;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .submenu-inner a:hover {
      color: #D97757;
    }

    .header-area:has(.about-item:hover) .submenu-about,
    .header-area:has(.submenu-about:hover) .submenu-about,
    .header-area:has(.products-item:hover) .submenu-products,
    .header-area:has(.submenu-products:hover) .submenu-products,
    .header-area:has(.partnership-item:hover) .submenu-partnership,
    .header-area:has(.submenu-partnership:hover) .submenu-partnership {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .logo {
      width: 160px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo img {
      width: 160px;
      height: 35px;
      display: block;
      object-fit: contain;
    }

    .gnb {
      width: 787px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
      flex-shrink: 0;
      margin-left: 80px;
      margin-right: auto;
    }

    .gnb li {
      height: 80px;
    }

    .gnb a {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      padding: 0 6px;
      text-decoration: none;
      color: #2f2f2f;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s ease;
      white-space: nowrap;
    }

    .gnb a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      background: #D97757;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .gnb a:hover {
      color: #D97757;
    }

    .gnb a:hover::after {
      opacity: 1;
    }

    /* keep 1st menu active when submenu is open */
    .header-area:has(.about-item:hover) .about-item > a,
    .header-area:has(.submenu-about:hover) .about-item > a {
      color: #D97757;
    }
    .header-area:has(.about-item:hover) .about-item > a::after,
    .header-area:has(.submenu-about:hover) .about-item > a::after {
      opacity: 1;
    }

    .header-area:has(.products-item:hover) .products-item > a,
    .header-area:has(.submenu-products:hover) .products-item > a {
      color: #D97757;
    }
    .header-area:has(.products-item:hover) .products-item > a::after,
    .header-area:has(.submenu-products:hover) .products-item > a::after {
      opacity: 1;
    }

    .header-area:has(.partnership-item:hover) .partnership-item > a,
    .header-area:has(.submenu-partnership:hover) .partnership-item > a {
      color: #D97757;
    }
    .header-area:has(.partnership-item:hover) .partnership-item > a::after,
    .header-area:has(.submenu-partnership:hover) .partnership-item > a::after {
      opacity: 1;
    }

    .util {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }

    .util a {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
    }

    .btn-store {
      width: 91px;
      height: 39px;
      background: #333333;
    }

    .btn-global {
      width: 106px;
      height: 39px;
      background: #D97757;
    }
  </style>
</head>
<body>
  <div class="header-area">
    <header class="header">
      <h1 class="logo">
        <a href="#">
          <img src="images/Logo.png" alt="로고">
        </a>
      </h1>

      <ul class="gnb">
        <li class="about-item"><a href="#">ABOUT</a></li>
        <li class="products-item"><a href="#">PRODUCTS</a></li>
        <li class="partnership-item"><a href="#">PARTNERSHIP</a></li>
        <li><a href="#">EDUCATION</a></li>
        <li><a href="#">WHAT'S NEW</a></li>
        <li><a href="#">SUPPORT</a></li>
      </ul>

      <div class="util">
        <a href="#" class="btn-store">매장찾기</a>
        <a href="#" class="btn-global">클로드마켓</a>
      </div>
    </header>

    <div class="submenu-wrap submenu-about">
      <div class="submenu-inner">
        <a href="#">대표 인사말</a>
        <a href="#">기업소개</a>
        <a href="#">비주얼 아이덴티티</a>
        <a href="#">사회공헌</a>
        <a href="#">오시는 길</a>
      </div>
    </div>

    <div class="submenu-wrap submenu-products">
      <div class="submenu-inner">
        <a href="#">AI &amp; 인공지능</a>
        <a href="#">Sonnet 모델</a>
        <a href="#">Coding Pro</a>
        <a href="#">대표적인 Ai</a>
      </div>
    </div>

    <div class="submenu-wrap submenu-partnership">
      <div class="submenu-inner">
        <a href="#">가맹점 현황</a>
        <a href="#">가맹점 개설 안내</a>
        <a href="#">가맹점 개설 문의</a>
        <a href="#">제휴 문의</a>
      </div>
    </div>
  </div>
</body>
</html>
